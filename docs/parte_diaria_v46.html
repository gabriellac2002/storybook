function kpiCard(icon, label, value, sub, accent, highlight=false, pct=null, trend=null) {
  const accentMap = { 'petra-yellow':'border-l-petra-yellow', 'blue':'border-l-petra-blue', 'green':'border-l-op-green', 'slate':'border-l-slate-400' };
  // v45 — 5.5: indicador de tendência vs período anterior (▲▼ com variação %)
  let trendHtml = '';
  if (trend != null) {
    if (trend > 0)       trendHtml = `<div class="text-xs font-bold text-op-green mt-1">▲ +${trend}% vs ontem</div>`;
    else if (trend < 0)  trendHtml = `<div class="text-xs font-bold text-op-red mt-1">▼ ${trend}% vs ontem</div>`;
    else                 trendHtml = `<div class="text-xs text-slate-400 mt-1">= igual a ontem</div>`;
  }
  return `
    <div class="mgmt-card rounded-xl p-4 border-l-4 ${accentMap[accent]||'border-l-slate-300'} ${highlight ? 'ring-2 ring-petra-yellow/40' : ''}">
      <div class="flex items-center justify-between mb-2">
        <div class="text-2xl">${icon}</div>
        ${highlight ? '<div class="text-xs hairline bg-petra-yellow/30 text-petra-blue px-2 py-0.5 rounded-full font-bold">DESTAQUE</div>' : ''}
      </div>
      <div class="hairline text-slate-500 mb-1">${label}</div>
      <div class="display-font text-3xl text-slate-900">${value}</div>
      <div class="text-xs text-slate-500 mt-1">${sub}</div>
      ${pct != null ? `<div class="h-1.5 bg-slate-200 rounded-full mt-2 overflow-hidden"><div class="h-full bg-op-green progress-bar" style="width:${pct}%"></div></div>` : ''}
      ${trendHtml}
    </div>
  `;
}

// v45 — 5.3: paginação do feed — página atual (resetada ao mudar filtros)
let _feedPage = 1;
const FEED_PAGE_SIZE = 30;

function _refreshFeedList(append=false) {
  const list = document.getElementById('feed-list');
  if (!list) return;
  if (append) {
    // remove o botão "carregar mais" antes de inserir novos itens
    const prev = document.getElementById('feed-load-more-btn');
    if (prev) prev.remove();
    list.insertAdjacentHTML('beforeend', renderFeedItems(getFeedFilter(), getFeedFilterEq(), getFeedPeriod(), getFeedSearch(), _feedPage, true));
  } else {
    list.innerHTML = renderFeedItems(getFeedFilter(), getFeedFilterEq(), getFeedPeriod(), getFeedSearch(), _feedPage, false);
  }
}

// v45 — 5.1: retorna timestamp de início do período selecionado
function feedPeriodStart(period) {
  const now = new Date();
  const startOfDay = (d) => new Date(d.getFullYear(), d.getMonth(), d.getDate(), 0, 0, 0).getTime();
  if (period === 'today')     return startOfDay(now);
  if (period === 'yesterday') { const y = new Date(now); y.setDate(y.getDate()-1); return startOfDay(y); }
  if (period === '7d')        return now.getTime() - 7 * 24 * 3600 * 1000;
  if (period === 'month')     return new Date(now.getFullYear(), now.getMonth(), 1).getTime();
  if (period === 'all')       return 0;
  return startOfDay(now);
}
function feedPeriodEnd(period) {
  if (period === 'yesterday') {
    const now = new Date();
    return new Date(now.getFullYear(), now.getMonth(), now.getDate(), 0, 0, 0).getTime() - 1;
  }
  return Date.now();
}

function renderFeedItems(filter='all', eqFilter='all-eq', period='today', search='', page=1, appendMode=false) {
  const pStart = feedPeriodStart(period);
  const pEnd   = feedPeriodEnd(period);
  let evs = State.events.filter(e => {
    const t = new Date(e.ts).getTime();
    return t >= pStart && t <= pEnd;
  });
  if (filter === 'alert') evs = evs.filter(e => e.type === 'alert-maintenance' || e.type === 'alert-production' || (e.type==='checklist' && !e.allOk));
  else if (filter === 'op') evs = evs.filter(e => ['trip','stock-in','stock-out','stop','pipa-load','furo','rompimento'].includes(e.type));
  if (eqFilter && eqFilter !== 'all-eq') evs = evs.filter(e => e.equipment === eqFilter);
  if (search && search.trim()) {
    const q = search.trim().toLowerCase();
    evs = evs.filter(e =>
      (e.text && e.text.toLowerCase().includes(q))
      || (e.operator && e.operator.toLowerCase().includes(q))
      || (e.equipment && e.equipment.toLowerCase().includes(q))
      || (eventLabel(e) && eventLabel(e).toLowerCase().includes(q))
    );
  }
  if (!evs.length) return '<div class="empty-state" style="color:#94a3b8;"><div class="empty-icon">📭</div><div class="empty-title" style="color:#475569;">Nenhum evento encontrado</div><div class="empty-sub">Tente mudar o filtro ou o período</div></div>';

  // v45 — 5.3: paginação
  const total = evs.length;
  const start = appendMode ? (page - 1) * FEED_PAGE_SIZE : 0;
  const end   = page * FEED_PAGE_SIZE;
  const pageEvs = evs.slice(start, end);
  const hasMore = end < total;

  const cards = pageEvs.map(e => {
    const isAlertMaint = e.type === 'alert-maintenance';
    const isAlertProd  = e.type === 'alert-production';
    const isAlert = isAlertMaint || isAlertProd;
    const isCritical = isAlertMaint && e.tag && e.tag.toLowerCase().includes('crít');
    const cardClass = isCritical
      ? 'bg-op-red/10 border-op-red/50 ring-1 ring-op-red/30'
      : isAlertMaint ? 'bg-op-red/5 border-op-red/30'
      : isAlertProd  ? 'bg-op-amber/5 border-op-amber/30'
      : 'bg-slate-50 border-slate-200';
    const resolveBtn = isAlert && !e.resolved
      ? `<button onclick="resolveAlert('${e.id}')" class="ml-auto text-xs px-2 py-0.5 rounded bg-op-green/20 text-op-green hover:bg-op-green/40 font-bold flex-shrink-0">✓ Resolver</button>`
      : (isAlert && e.resolved ? `<span class="ml-auto text-xs text-slate-400">✓ Resolvido</span>` : '');
    return `
      <div class="${cardClass} border rounded-lg p-2.5 text-xs">
        <div class="flex items-center gap-2 mb-1">
          <span class="text-base">${eventIcon(e.type, e.subtype)}</span>
          <span class="font-bold text-slate-800 flex-1 truncate">${eventLabel(e)}</span>
          ${resolveBtn}
          <span class="text-slate-400 mono-font ml-1">${fmtTimeShort(e.ts)}</span>
        </div>
        <div class="text-slate-500 text-[11px] truncate pl-6">${escapeHtml(e.equipment||'')} ${e.operator?'· '+escapeHtml(e.operator):''}</div>
        ${e.text ? `<div class="text-slate-700 mt-1 pl-6">${escapeHtml(e.text)}</div>` : ''}
      </div>
    `;
  }).join('');

  const loadMoreBtn = hasMore
    ? `<div id="feed-load-more-btn" class="pt-1"><button onclick="feedLoadMore()" class="w-full text-xs py-2 rounded-lg bg-slate-100 hover:bg-slate-200 text-slate-600 font-semibold">Carregar mais (${total - end} restantes)</button></div>`
    : (total > FEED_PAGE_SIZE ? `<div class="text-center text-xs text-slate-400 pt-1">— ${total} eventos exibidos —</div>` : '');

  return cards + loadMoreBtn;
}

// v45 — 9.1: Relatório de produtividade por operador
function renderMgmtOperadores() {
  if (!State.managementUser) return renderMgmtLogin();

  // Período selecionado (reutiliza _feedPeriod para consistência)
  const period = getFeedPeriod();
  const pStart = feedPeriodStart(period);
  const pEnd   = feedPeriodEnd(period);
  const periodLabel = { today:'Hoje', yesterday:'Ontem', '7d':'Últimos 7 dias', month:'Este mês', all:'Todo o período' };

  const evs = State.events.filter(e => {
    const t = new Date(e.ts).getTime();
    return t >= pStart && t <= pEnd;
  });

  // Agrupa por operador
  const byOp = {};
  evs.forEach(e => {
    const name = e.operator || '—';
    if (!byOp[name]) byOp[name] = { trips: 0, tons: 0, stops: 0, stopMs: 0, shifts: new Set(), alerts: 0 };
    const o = byOp[name];
    if (e.type === 'trip' && e.subtype === 'productive') { o.trips++; o.tons += e.tons || 0; }
    if (e.type === 'stock-out') { o.trips++; o.tons += e.tons || 0; }
    if (e.type === 'stop') { o.stops++; if (e.durationMs) o.stopMs += e.durationMs; }
    if (e.type === 'alert-maintenance' || e.type === 'alert-production') o.alerts++;
    if (e.shiftId) o.shifts.add(e.shiftId);
  });

  const rows = Object.entries(byOp)
    .map(([name, d]) => ({ name, ...d, shifts: d.shifts.size }))
    .sort((a, b) => b.tons - a.tons);

  const navTabs = `
    <div class="flex items-center bg-slate-100 rounded-xl p-1 gap-1 mb-6 w-fit flex-wrap">
      <button onclick="navigate('mgmt-dashboard')" class="px-3 py-1.5 rounded-lg font-semibold text-sm text-slate-500 hover:bg-white hover:text-slate-800 transition"><span class="inline-flex items-center gap-1.5">${icon('gauge',14)} Dashboard</span></button>
      <button onclick="navigate('mgmt-pcp')" class="px-3 py-1.5 rounded-lg font-semibold text-sm text-slate-500 hover:bg-white hover:text-slate-800 transition"><span class="inline-flex items-center gap-1.5">${icon('calendar',14)} PCP</span></button>
      <button onclick="navigate('mgmt-stock')" class="px-3 py-1.5 rounded-lg font-semibold text-sm text-slate-500 hover:bg-white hover:text-slate-800 transition"><span class="inline-flex items-center gap-1.5">${icon('stockpile',14)} Estoque</span></button>
      <button onclick="navigate('mgmt-operadores')" class="px-3 py-1.5 rounded-lg font-semibold text-sm bg-white text-petra-blue shadow-sm"><span class="inline-flex items-center gap-1.5">${icon('user',14)} Operadores</span></button>
      <button onclick="navigate('mgmt-cadastros')" class="px-3 py-1.5 rounded-lg font-semibold text-sm text-slate-500 hover:bg-white hover:text-slate-800 transition"><span class="inline-flex items-center gap-1.5">${icon('list',14)} Cadastros</span></button>
    </div>`;

  const periodSelector = `
    <div class="flex gap-1 mb-4 flex-wrap text-xs">
      ${[['today','Hoje'],['yesterday','Ontem'],['7d','7 dias'],['month','Mês'],['all','Tudo']].map(([val,label]) => {
        const active = getFeedPeriod() === val;
        return `<button onclick="setFeedPeriod('${val}');render();" class="px-2.5 py-1 rounded-full ${active?'bg-petra-blue text-white':'bg-slate-200 text-slate-700'} font-semibold">${label}</button>`;
      }).join('')}
    </div>`;

  const tableRows = rows.length === 0
    ? `<tr><td colspan="6" class="text-center py-8 text-slate-400">Nenhum evento registrado no período.</td></tr>`
    : rows.map((r, i) => `
      <tr class="${i % 2 === 0 ? 'bg-white' : 'bg-slate-50'} hover:bg-petra-yellow/5 transition">
        <td class="px-4 py-3 font-bold text-slate-800">${i === 0 ? '🥇 ' : i === 1 ? '🥈 ' : i === 2 ? '🥉 ' : ''}${escapeHtml(r.name)}</td>
        <td class="px-4 py-3 text-right font-black text-petra-blue mono-font">${fmtNumber(Math.round(r.tons))} t</td>
        <td class="px-4 py-3 text-right mono-font">${r.trips}</td>
        <td class="px-4 py-3 text-right mono-font">${r.stops}</td>
        <td class="px-4 py-3 text-right mono-font text-op-red">${r.alerts > 0 ? r.alerts : '—'}</td>
        <td class="px-4 py-3 text-right mono-font text-slate-500">${r.stopMs > 0 ? fmtDurationShort(r.stopMs) : '—'}</td>
      </tr>`).join('');

  return `
    <div class="px-6 py-5">
      <div class="flex items-center justify-between mb-3 flex-wrap gap-2">
        <div>
          <div class="hairline text-petra-blue text-xs">${periodLabel[period] || period}</div>
          <h1 class="display-font text-2xl text-slate-900">Produtividade por Operador</h1>
        </div>
        <button onclick="doMgmtLogout()" class="px-3 py-1.5 bg-slate-100 hover:bg-slate-200 rounded-lg font-semibold text-sm text-slate-600">Sair</button>
      </div>
      ${navTabs}
      ${periodSelector}
      <div class="mgmt-card rounded-2xl overflow-hidden">
        <table class="w-full text-sm border-collapse">
          <thead>
            <tr class="bg-petra-blue text-white">
              <th class="px-4 py-3 text-left font-bold hairline">Operador</th>
              <th class="px-4 py-3 text-right font-bold hairline">Toneladas</th>
              <th class="px-4 py-3 text-right font-bold hairline">Viagens</th>
              <th class="px-4 py-3 text-right font-bold hairline">Paradas</th>
              <th class="px-4 py-3 text-right font-bold hairline">Alertas</th>
              <th class="px-4 py-3 text-right font-bold hairline">Tempo parado</th>
            </tr>
          </thead>
          <tbody>${tableRows}</tbody>
          ${rows.length > 1 ? `<tfoot>
            <tr class="bg-slate-100 font-bold text-slate-700 border-t border-slate-200">
              <td class="px-4 py-2">TOTAL</td>
              <td class="px-4 py-2 text-right mono-font text-petra-blue">${fmtNumber(Math.round(rows.reduce((a,r)=>a+r.tons,0)))} t</td>
              <td class="px-4 py-2 text-right mono-font">${rows.reduce((a,r)=>a+r.trips,0)}</td>
              <td class="px-4 py-2 text-right mono-font">${rows.reduce((a,r)=>a+r.stops,0)}</td>
              <td class="px-4 py-2 text-right mono-font">${rows.reduce((a,r)=>a+r.alerts,0)}</td>
              <td class="px-4 py-2"></td>
            </tr>
          </tfoot>` : ''}
        </table>
      </div>
      <div class="text-xs text-slate-400 mt-3 text-center">Dados referentes a: ${periodLabel[period]||period}. Use os filtros de período para comparar intervalos.</div>
    </div>
  `;
}

        const campos = ['equipments','operators','events','pcp'];
        for (const c of campos) {
          if (!parsed[c]) { toast(`Arquivo inválido: campo "${c}" ausente.`, 'err', 5000); return; }
        }
        showConfirm(
          `⚠️ Restaurar Backup\n\nIsso vai SUBSTITUIR todos os dados atuais pelo backup de "${file.name}". Esta ação não pode ser desfeita. Tem certeza?`,
          function() {
            applyParsedState(parsed);
            notify();
            render();
            toast('Backup restaurado com sucesso!', 'ok', 5000);
          }
        );
      } catch(err) {
        console.error('Erro ao importar backup', err);
        toast('Erro ao ler o arquivo. Verifique se é um JSON válido.', 'err', 5000);
      }
    };
    reader.readAsText(file);
  };
  document.body.appendChild(input);
  input.click();
  setTimeout(() => input.remove(), 1000);
}
function exportPanelReport(area, format) {
  showLoading(format === 'pdf' ? 'Gerando PDF…' : format === 'excel' ? 'Gerando Excel…' : 'Gerando CSV…');
  // setTimeout garante que o overlay aparece antes do trabalho pesado bloquear a thread
  setTimeout(() => {
    try {
      const report = buildPanelReport(area);
      if (!report || !report.sheets?.length) { hideLoading(); toast('Não há dados para exportar.', 'err'); return; }
      const safeTitle = report.title.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^a-z0-9]+/g,'_').replace(/^_|_$/g,'') || 'relatorio';
      const filenameBase = `${safeTitle}_${reportFileStamp()}`;
      if (format === 'pdf') { openPdfReport(report); }
      else if (format === 'excel') { downloadExcelReport(report, filenameBase + '.xls'); }
      else if (format === 'csv') { downloadCsvReport(report, filenameBase + '.csv'); }
    } finally {
      hideLoading();
    }
  }, 50);
}
function downloadCsvReport(report, filename) {
  const parts = [];
  report.sheets.forEach((s, idx) => {
    if (idx) parts.push('', '');
    parts.push(csvCell(s.name));
    parts.push((s.headers||[]).map(csvCell).join(';'));
    (s.rows||[]).forEach(r => parts.push((r||[]).map(csvCell).join(';')));
  });
  downloadBlob(filename, '\ufeff' + parts.join('\n'), 'text/csv;charset=utf-8;');
  toast('CSV exportado.', 'ok');
}

function buildPanelReport(area) {

function buildPcpReport() {
  const p = pcpEnsureV32();
  const m = p.monthly.month || pcpMonthStr();
  const days = Array.from({length:p.monthly.calendarDays}, (_,i)=>`${m}-${pcpPad(i+1)}`);
  const monthly = pcpMonthlySummary();
  const calendarRows = days.map(ds => {
    const cal = pcpGetCalendarDay(ds), tp = pcpBuildDailyPlan(ds), dp = pcpBuildDrillPlan(ds);
    const actualT = pcpEventsForDate(ds).filter(e=>e.type==='trip'&&e.subtype==='productive').reduce((a,e)=>a+(Number(e.tons)||0),0);
    return [ds, pcpWeekday(ds,false), cal.type, cal.productive?'Sim':'Não', cal.hours||0, `${tp.cfg?.intervalStart||''} às ${tp.cfg?.intervalEnd||''}`, Math.round(tp.dailyTargetTons*10)/10, Math.round(actualT*10)/10, Math.round(dp.targetMeters*10)/10, Math.round(dp.actualMeters*10)/10, cal.detonation?'Sim':'Não', cal.detonationVolume||0, cal.minesRequired||0];
  });
  const selectedDate = p.date || pcpTodayStr();
  const tp = pcpBuildDailyPlan(selectedDate);
  const transportRows = tp.hourlyDistribution.map(s => [selectedDate, s.start, s.minutes, ...tp.trucks.map(t=>s.tripsByTruck[t.id]||0), s.totalTrips, Math.round(s.tons*10)/10]);
  const dp = pcpBuildDrillPlan(selectedDate);
  const drillRows = dp.hourlyDistribution.map(s => [selectedDate, s.start, s.minutes, ...dp.drills.map(d=>s.metersByDrill[d.id]||0), Math.round(s.meters*10)/10]);
  const bits = (dp.cfg.bits||[]).map(b => [b.n, b.status||'', b.meters||0, b.hastes||0, b.punhos||0, b.luvas||0]);
  const holes = (dp.cfg.plannedHoles||[]).map(h => [h.number||h.n||'', h.depth||h.profundidade||'', h.bit||'', h.status||'pendente']);
  // v44.8 — consolidado do patch v36 (sheet "Perdas de Viagem" inline)
  const tlRows = (typeof tripLossLossRows === 'function')
    ? tripLossLossRows().map(r=>[r.date||'',r.hour||'',r.equipmentId||'',r.targetTrips||0,r.actualTrips||0,r.deficitTrips||0,Math.round((r.deficitTons||0)*10)/10,r.reason||'Pendente',r.relatedEquipmentId||'',r.note||'',r.operator||''])
    : [];
  return {title:'PCP Mensal — Transporte, Perfuração e Detonação', sheets:[
    {name:'Resumo Mensal', headers:['Meta Mensal','Produzido','Saldo','%','Dias Produtivos','Dias Restantes','Necessário/Dia','Projetado','Status'], rows:[[monthly.target, Math.round(monthly.produced*10)/10, Math.round(monthly.saldo*10)/10, monthly.pct+'%', monthly.productiveDays.length, monthly.remainingDays.length, Math.round(monthly.requiredPerRemainingDay*10)/10, Math.round(monthly.projected*10)/10, monthly.status]]},
    {name:'Calendário Mensal', headers:['Data','Dia Semana','Tipo','Produtivo','Horas','Intervalo','Meta Transporte t','Real Transporte t','Meta Perfuração m','Real Perfuração m','Detonação','Volume Detonação t','Minas'], rows:calendarRows},
    {name:'Transporte Dia Selecionado', headers:['Data','Horário','Minutos', ...tp.trucks.map(t=>`Meta ${t.code}`), 'Total viagens','Toneladas'], rows:transportRows},
    {name:'Perfuração Dia Selecionado', headers:['Data','Horário','Minutos', ...dp.drills.map(d=>`Meta ${d.code} m`), 'Total metros'], rows:drillRows},
    {name:'Bits Planejados', headers:['Bit','Status','Metros','Hastes','Punhos','Luvas'], rows:bits},
    {name:'Furos Planejados', headers:['Furo','Profundidade','Bit','Status'], rows:holes},
    {name:'Perdas de Viagem', headers:['Data','Horário','Caminhão','Meta','Real','Déficit viagens','Déficit t','Motivo','Equipamento relacionado','Observação','Operador'], rows:tlRows}
  ]};
}

function pcpSetActiveTab(tab){pcpEnsureV32().activeTab=tab; saveState(); render();}
function pcpSetMonthly(field,value){const p=pcpEnsureV32(); if(field==='month') p.monthly.month=value; else p.monthly[field]=Number(value)||0; if(field==='month'||field==='defaultHoursPerDay') pcpRegenerateCalendar(false); saveState(); render();}

function pcpSetMeters(id,val){if(!State.pcp.plans[id])State.pcp.plans[id]={meters:0,enabled:true}; State.pcp.plans[id].meters=Math.max(0,parseInt(val)||0); saveState();}
function pcpAdjustDrill(id,delta){if(!State.pcp.plans[id])State.pcp.plans[id]={meters:0,enabled:true}; State.pcp.plans[id].meters=Math.max(0,(State.pcp.plans[id].meters||0)+delta); const el=document.getElementById('pcp-meters-'+id); if(el)el.value=State.pcp.plans[id].meters; saveState();}
function pcpSaveNotes(val){pcpEnsureV32().notes=val; saveState(); toast('Observações salvas!','ok');}
function pcpSaveDeviation(key,reason,note=''){const p=pcpEnsureV32(); p.hourlyJustifications[key]={reason,note,ts:new Date().toISOString(),operator:State.tabletSession?.operator?.name||State.managementUser?.name||'Sistema'}; saveState();}
function pcpSetDrillParam(field,value){const p=pcpEnsureV32(); p.drilling[field]=Number(value)||0; saveState(); render();}
function pcpToggleDailyDrill(id,checked){const cfg=pcpGetDailyDrillPlan(State.pcp.date), set=new Set(cfg.drillIds||[]); checked?set.add(id):set.delete(id); cfg.drillIds=Array.from(set); saveState(); render();}
function pcpSetDrillField(field,value){const cfg=pcpGetDailyDrillPlan(State.pcp.date); cfg[field]=['effectiveHours','holesPlanned','defaultHoleDepth','detonationVolume','minesRequired'].includes(field)?Number(value)||0:value; if(['start','end','intervalStart','intervalEnd'].includes(field)) cfg.effectiveHours=pcpCalcEffectiveHours(cfg); saveState(); render();}
function pcpAddDrillBit(){const cfg=pcpGetDailyDrillPlan(State.pcp.date); const next=(cfg.bits||[]).reduce((m,b)=>Math.max(m,Number(b.n)||0),0)+1; cfg.bits.push({n:next,meters:0,hastes:0,punhos:0,luvas:0,status:'em uso'}); saveState(); render();}
function pcpRemoveDrillBit(idx){const cfg=pcpGetDailyDrillPlan(State.pcp.date); cfg.bits.splice(idx,1); saveState(); render();}
function pcpSetBitField(idx,field,value){const cfg=pcpGetDailyDrillPlan(State.pcp.date); if(!cfg.bits[idx])return; cfg.bits[idx][field]=['n','meters','hastes','punhos','luvas'].includes(field)?Number(value)||0:value; saveState(); render();}

            <div class="text-xs hairline text-slate-400">meta</div>

function stockAdjustBalance(id, delta) {
  if (!State.stockLevels[id]) State.stockLevels[id] = { balance: 0, target: DEFAULT_STOCK_TARGET, lastUpdated: null };
  State.stockLevels[id].balance = Math.max(0, (State.stockLevels[id].balance||0) + delta);
  State.stockLevels[id].lastUpdated = new Date().toISOString();
  saveState(); render();
}
function stockEditBalance(id) {
  const s = State.stockLevels[id] || { balance: 0, target: DEFAULT_STOCK_TARGET };
  const mat = State.materials.find(m => m.id === id);
  const val = prompt(`Saldo atual de ${mat ? mat.name : id} (toneladas):`, s.balance);
  if (val === null) return;
  const n = parseFloat(val);
  if (isNaN(n) || n < 0) { toast('Valor inválido', 'err'); return; }
  State.stockLevels[id].balance = n;
  State.stockLevels[id].lastUpdated = new Date().toISOString();
  saveState(); render(); toast('Saldo atualizado!', 'ok');
}
function stockResetAllTargets() {
  document.getElementById('stock-targets-modal')?.classList.remove('hidden');
}
function stockSaveTargets() {
  State.materials.forEach(m => {
    const el = document.getElementById('target-' + m.id);
    if (el) {
      const v = parseFloat(el.value);
      if (!isNaN(v) && v >= 0) {
        if (!State.stockLevels[m.id]) State.stockLevels[m.id] = { balance: 0, target: v, lastUpdated: null };
        else State.stockLevels[m.id].target = v;
      }
    }
  });
  document.getElementById('stock-targets-modal')?.classList.add('hidden');
  saveState(); render(); toast('Metas de estoque salvas!', 'ok');
}

function mgmtDeleteEquipment(id) {
  const eq = State.equipments.find(e=>e.id===id);
  const nome = eq ? `"${eq.code} — ${eq.name}"` : 'este equipamento';
  const eqTrips = State.events.filter(e => getEventEquipmentId(e) === id).length;
  const aviso = eqTrips > 0 ? ` Há ${eqTrips} evento(s) vinculados que ficarão sem referência.` : '';
  showConfirm(`Excluir o equipamento ${nome}?${aviso} Esta ação não pode ser desfeita.`, () => {
    State.equipments = State.equipments.filter(e=>e.id!==id);
    delete State.equipmentStates[id];
    saveState(); render(); toast(`Equipamento ${nome} excluído.`, 'ok');
  }, 'Excluir','Cancelar',true);
}
function mgmtDeleteOperator(id) {
  const op = State.operators.find(o=>o.id===id);
  const nome = op ? `"${op.name}"` : 'este operador';
  if (State.operators.filter(o=>o.role==='admin').length <= 1 && op?.role==='admin') {
    toast('Não é possível excluir o único administrador.','err'); return;
  }
  showConfirm(`Excluir o operador ${nome}? O histórico de eventos registrados por ele é mantido, mas ele não poderá mais fazer login.`, () => {
    State.operators = State.operators.filter(o=>o.id!==id);
    saveState(); render(); toast(`Operador ${nome} excluído.`, 'ok');
  }, 'Excluir','Cancelar',true);
}

}

function mgmtDeleteMaterial(id) {

function mgmtDeleteTruckType(idx) {

function mgmtSaveEquipment(id) {
  const code = document.getElementById('eq-code').value.trim();
  const name = document.getElementById('eq-name').value.trim();
  const kind = document.getElementById('eq-kind').value;
  if (!code || !name) { toast('Código e Nome são obrigatórios.','err'); return; }
  if (!id && State.equipments.find(e=>e.code===code)) { toast('Já existe um equipamento com este código.','err'); return; }
  const iconValue = document.getElementById('eq-icon').value.trim() || '🔧';
  const category = document.getElementById('eq-category').value.trim() || kind;
  const capacity = parseFloat(document.getElementById('eq-capacity').value)||0;
  const lastHorimeter = parseFloat(document.getElementById('eq-horimeter').value)||0;
  if (id) {
    const eq = State.equipments.find(e=>e.id===id);
    if (eq) Object.assign(eq, { code, name, kind, icon: iconValue, category, capacity, lastHorimeter });
  } else {
    const newEq = { id:code, code, name, kind, icon: iconValue, category, capacity, lastHorimeter };
    State.equipments.push(newEq);
    State.equipmentStates[code] = { status:'off', operator:null, since:null, shiftStart:null, tripsToday:0, tonsToday:0, litersToday:0, loadsToday:0 };
  }

function mgmtSaveOperator(id) {

}

function mgmtSaveAlertTemplate(type, id) {

  toast(id ? 'Template atualizado ✓' : 'Template cadastrado ✓','ok');
}

function mgmtSaveTruckType(idx) {
  const name = document.getElementById('tt-name').value.trim();
  const tonsRaw = document.getElementById('tt-tons').value;
  const tonsResult = parseNumberPtBr(tonsRaw, { min: 0.1, max: 200 });
  if (!name) { toast('Falta informar o nome do tipo de caminhão.', 'err'); return; }
  if (!tonsResult.ok) { toast(`Tonelagem inválida: ${tonsResult.error}`, 'err'); return; }
  const tons = tonsResult.value;
  if (idx >= 0) {
    State.truckTypes[idx] = { name, tons };
  } else {
    State.truckTypes.push({ name, tons });
  }
  saveState(); closeModal(); render(); toast(idx>=0?'Atualizado ✓':'Cadastrado ✓','ok');
}

  return `${h}:${m}:${s}`;

// Estatísticas das paradas do turno atual (para mostrar contexto no modal)
function getShiftStopStats() {
  const evs = State.events || [];
  const eqId = State.tabletSession?.boundEquipmentId;
  const shiftStart = State.tabletSession?.shiftStartedAt;
  if (!eqId || !shiftStart) return { count:0, totalMs:0, history:[] };
  const startMs = new Date(shiftStart).getTime();
  const stops = evs.filter(e => e.type === 'stop' && e.equipment === eqId && new Date(e.ts).getTime() >= startMs);
  const totalMs = stops.reduce((acc, e) => acc + (Number(e.duration) || 0), 0);
  // Ordem cronológica (do mais antigo ao mais recente)
  const history = [...stops].sort((a,b) => new Date(a.start||a.ts) - new Date(b.start||b.ts));
  return { count: stops.length, totalMs, history };
}

// Estatísticas completas do turno (para o modal de encerramento)
function getShiftSummary() {
  const evs = State.events || [];
  const eqId = State.tabletSession?.boundEquipmentId;
  const shiftStart = State.tabletSession?.shiftStartedAt;
  if (!eqId || !shiftStart) return null;
  const startMs = new Date(shiftStart).getTime();
  const nowMs = Date.now();
  const shiftEvents = evs.filter(e => e.equipment === eqId && new Date(e.ts).getTime() >= startMs);
  const trips = shiftEvents.filter(e => e.type === 'trip');
  const productive = trips.filter(e => e.subtype === 'productive');
  const sterile   = trips.filter(e => e.subtype === 'sterile');
  const stops     = shiftEvents.filter(e => e.type === 'stop');
  const stockOuts = shiftEvents.filter(e => e.type === 'stock-out');
  const alerts    = shiftEvents.filter(e => e.type === 'alert-maintenance' || e.type === 'alert-production');
  const tonsTotal = productive.reduce((a,e) => a + (Number(e.tons)||0), 0)
                  + stockOuts.reduce((a,e) => a + (Number(e.tons)||0), 0);
  const stopMs   = stops.reduce((a,e) => a + (Number(e.duration)||0), 0);
  const shiftMs  = nowMs - startMs;
  const opMs     = Math.max(0, shiftMs - stopMs);
  // Meta PCP do dia (caminhão)
  let target = 0;
  try { target = pcpGetTodayTruckTarget(eqId)?.dailyTripsForTruck || 0; } catch(e) {}
  const pct = target > 0 ? Math.min(999, Math.round(productive.length / target * 100)) : null;
  return {
    shiftStart, shiftMs, opMs, stopMs,
    trips: trips.length,
    productive: productive.length,
    sterile: sterile.length,
    tonsTotal,
    stopCount: stops.length,
    stockOuts: stockOuts.length,
    alertCount: alerts.length,
    target,
    pct,
    history: shiftEvents.sort((a,b) => new Date(a.ts) - new Date(b.ts)),
  };
}

// Slide-to-confirm — inicializa o gesto no DOM após o modal abrir
function initSlideConfirm(rootId, onConfirm) {
  const root = document.getElementById(rootId);
  if (!root) return;
  const thumb = root.querySelector('.slide-confirm-thumb');
  if (!thumb) return;
  let dragging = false, startX = 0, currentX = 0, maxX = 0;
  const computeMax = () => { maxX = root.clientWidth - thumb.clientWidth - 8; };
  const setX = (x) => {
    const clamped = Math.max(0, Math.min(maxX, x));
    thumb.style.transform = `translateX(${clamped}px)`;
    currentX = clamped;
    if (clamped > maxX * 0.85) root.classList.add('armed'); else root.classList.remove('armed');
  };
  const onDown = (e) => {
    dragging = true; computeMax();
    startX = (e.touches ? e.touches[0].clientX : e.clientX) - currentX;
    thumb.style.transition = 'none';
    e.preventDefault();
  };
  const onMove = (e) => {
    if (!dragging) return;
    const x = (e.touches ? e.touches[0].clientX : e.clientX) - startX;
    setX(x);
  };
  const onUp = () => {
    if (!dragging) return;
    dragging = false;
    thumb.style.transition = 'transform .25s ease-out';
    if (currentX > maxX * 0.85) {
      setX(maxX);
      root.classList.add('completed');
      setTimeout(onConfirm, 200);
    } else {
      setX(0);
    }
  };
  thumb.addEventListener('mousedown', onDown);
  thumb.addEventListener('touchstart', onDown, { passive: false });
  window.addEventListener('mousemove', onMove);
  window.addEventListener('touchmove', onMove, { passive: false });
  window.addEventListener('mouseup', onUp);
  window.addEventListener('touchend', onUp);
}

// Char counter para textareas (usado nos modais de obs/encerramento)
function initCharCounter(textareaId, counterId, max=500) {
  const ta = document.getElementById(textareaId);
  const ct = document.getElementById(counterId);
  if (!ta || !ct) return;
  const update = () => {
    const len = ta.value.length;
    ct.textContent = `${len} / ${max}`;
    ct.classList.toggle('warn', len > max * 0.8 && len <= max);
    ct.classList.toggle('err', len > max);
  };
  ta.addEventListener('input', update);
  update();
}

// v46: loadState sempre inicia do zero — persistência via arquivo (exportBackup/importBackup)
function loadState() {
  // Limpa localStorage residual de versões anteriores (libera espaço)
  try { localStorage.removeItem(STORAGE_KEY); } catch(e) {}
  State = buildInitialState();
  normalizeStateAfterLoad();
  if (typeof tripLossEnsure === 'function') tripLossEnsure();
}

// v46: carrega State a partir de um objeto JSON já parseado (usado pelo importBackup)
function applyParsedState(parsed) {
  const essential = { equipments: [], operators: [], events: [], pcp: null, materials: [], equipmentStates: {} };
  for (const [campo, valorPadrao] of Object.entries(essential)) {
    if (parsed[campo] == null) parsed[campo] = valorPadrao;
  }
  State = parsed;
  if (!State.tabletTheme) State.tabletTheme = 'dark';
  if (!State._feedFilterEq) State._feedFilterEq = 'all-eq';
  if (!State._cadastroTab) State._cadastroTab = 'equipamentos';
  if (!State.pcp) {
    const _d = new Date(), _p = n => String(n).padStart(2,'0');
    const t = `${_d.getFullYear()}-${_p(_d.getMonth()+1)}-${_p(_d.getDate())}`;
    State.pcp = { date: t, plans: {}, drillMeters: 80, notes: '' };
    (State.equipments||[]).filter(e=>e.kind==='truck').forEach(e=>{ State.pcp.plans[e.id]={trips:60,enabled:true}; });
  }
  if (typeof pcpEnsureV32 === 'function') pcpEnsureV32();
  if (!State.stockLevels) {
    State.stockLevels = {};
    (State.materials||[]).forEach(m=>{ State.stockLevels[m.id]={balance:0,target:DEFAULT_STOCK_TARGET,lastUpdated:null}; });
  }
  if (State.equipments) {
    State.equipments.forEach(eq => {
      if (!State.equipmentStates[eq.id]) {
        State.equipmentStates[eq.id] = { status:'off', operator:null, since:null, shiftStart:null, tripsToday:0, tonsToday:0, litersToday:0, loadsToday:0 };
      }
    });
  }
  normalizeStateAfterLoad();
  State.modal = null;
  if (typeof tripLossEnsure === 'function') tripLossEnsure();
}

// Actions
function getEventEquipmentId(ev) { return ev?.equipmentId || ev?.equipment || null; }
function normalizeEvent(ev) {
  if (!ev) return ev;
  const id = getEventEquipmentId(ev);
  if (id) { ev.equipment = id; ev.equipmentId = id; }
  return ev;
}
function normalizeStateAfterLoad() {
  if (!State) return;
  State.events = (State.events || []).map(normalizeEvent);
  if (!State.equipmentStates) State.equipmentStates = {};
  (State.equipments||[]).forEach(eq => {
    if (!State.equipmentStates[eq.id]) State.equipmentStates[eq.id] = { status:'off', operator:null, since:null, shiftStart:null, tripsToday:0, tonsToday:0, litersToday:0, loadsToday:0 };
    const st = State.equipmentStates[eq.id];
    if (st.tonsToday == null) st.tonsToday = 0;
    if (st.tripsToday == null) st.tripsToday = 0;
    if (st.litersToday == null) st.litersToday = 0;
    if (st.loadsToday == null) st.loadsToday = 0;
  });
  if (State.tabletSession?.activeStop && State.tabletSession.boundEquipmentId) {
    const eqId = State.tabletSession.boundEquipmentId;
    State.equipmentStates[eqId] = { ...(State.equipmentStates[eqId]||{}), status:'stopped', since:State.tabletSession.activeStop.startTs, activeStopStart:State.tabletSession.activeStop.startTs, stopReason:State.tabletSession.activeStop.reason || 'Aguardando motivo' };
  }
}
// v44.1 TZ-1: timestamp ISO mantendo offset local (sem virar UTC).
// Antes: new Date().toISOString() → "2026-05-27T01:00:00Z" para 22h de SP (UTC-3),
// fazendo .slice(0,10) virar "2026-05-27" enquanto pcpTodayStr() = "2026-05-26".
// Resultado: evento criado às 22h SUMIA do dia em que aconteceu no PCP.
// Agora: localISOString() → "2026-05-26T22:00:00-03:00", slice(0,10) = data local.
function localISOString(d=new Date()) {
  const pad = n => String(n).padStart(2,'0');
  const tz = -d.getTimezoneOffset();           // minutos relativos ao UTC (positivo se à frente)
  const sign = tz >= 0 ? '+' : '-';
  const tzH = pad(Math.floor(Math.abs(tz)/60));
  const tzM = pad(Math.abs(tz)%60);
  return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}T${pad(d.getHours())}:${pad(d.getMinutes())}:${pad(d.getSeconds())}${sign}${tzH}:${tzM}`;
}
function pushEvent(ev) {
  ev.id = ev.id || uid();
  ev.ts = ev.ts || localISOString();
  normalizeEvent(ev);
  State.events.unshift(ev);
  // v45 — 2.3: avisa ao se aproximar do limite e oferece arquivo dos eventos que serão perdidos
  const WARN_AT = Math.floor(CONFIG.MAX_EVENTS * 0.9); // avisa nos 10% finais
  if (State.events.length > CONFIG.MAX_EVENTS) {
    const excedentes = State.events.slice(CONFIG.MAX_EVENTS);
    // Oferecer download automático dos eventos que serão descartados
    try {
      const blob = new Blob([JSON.stringify(excedentes, null, 2)], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      const stamp = new Date().toISOString().slice(0, 10);
      a.href = url;
      a.download = `petra_eventos_arquivados_${stamp}.json`;
      document.body.appendChild(a);
      a.click();
      setTimeout(() => { URL.revokeObjectURL(url); a.remove(); }, 1000);
      toast(`⚠️ Histórico cheio: ${excedentes.length} eventos antigos arquivados em download automático.`, 'err', 9000);
    } catch(e) {
      console.warn('[pushEvent] Falha ao arquivar eventos excedentes:', e);
    }
    State.events.length = CONFIG.MAX_EVENTS;
  } else if (State.events.length === WARN_AT) {
    toast(`⚠️ Histórico a 90% da capacidade (${WARN_AT} eventos). Exporte um backup no painel gerencial.`, 'err', 7000);
  }
}
function findEquipment(id) { return State.equipments.find(e => e.id === id); }
function resolveAlert(id) {
  const ev = State.events.find(e => e.id === id);
  if (ev) { ev.resolved = true; saveState(); render(); }
}
function getOpenMaintenanceAlerts(equipmentId=null) {
  return State.events.filter(e => e.type === 'alert-maintenance' && !e.resolved && (!equipmentId || getEventEquipmentId(e) === equipmentId));
}
function getOpenProductionAlerts(equipmentId=null) {
  return State.events.filter(e => e.type === 'alert-production' && !e.resolved && (!equipmentId || getEventEquipmentId(e) === equipmentId));
}
function getTodayEvents(equipmentId=null) {
  const t = new Date(); const start = new Date(t.getFullYear(), t.getMonth(), t.getDate(), 0,0,0).getTime();
  return State.events.filter(e => new Date(e.ts).getTime() >= start && (!equipmentId || getEventEquipmentId(e) === equipmentId));
}
function navigate(screen, params={}) {
  State.currentScreen = screen;
  State.modal = null;
  Object.assign(State, params);
  saveState(); render();
}
function openModal(type, params={}) { State.modal = { type, params }; saveState(); render(); }
function closeModal() { State.modal = null; saveState(); render(); }
function setView(view) {
  State.currentView = view;
  if (view === 'management') {
    State.currentScreen = State.managementUser ? 'mgmt-dashboard' : 'mgmt-login';
  } else {
    if (!State.tabletSession.boundEquipmentId) State.currentScreen = 'tablet-login';
    else if (!State.tabletSession.operator) State.currentScreen = 'tablet-login';
    else if (State.tabletSession.blocked) State.currentScreen = 'tablet-blocked';
    else if (!State.tabletSession.checklistDone) State.currentScreen = 'tablet-checklist';
    else if (State.tabletSession.initialHorimeter == null && State.tabletSession.initialHorimeters == null) State.currentScreen = 'tablet-horimeter';
    else State.currentScreen = 'tablet-operational';
  }
  saveState(); render();
}

function initCharts() {
  if (typeof Chart === 'undefined') {
    // Chart.js ainda não carregou (ex: defer + conexão lenta) — tenta de novo em 500ms
    setTimeout(initCharts, 500);
    return;
  }
  const todayEv = getTodayEvents();
  // === Trips per hour bar chart ===
  const tripsByHour = new Array(24).fill(0);
  todayEv.forEach(e => {
    if (e.type === 'trip' && e.subtype === 'productive') {
      const h = new Date(e.ts).getHours();
      tripsByHour[h] += 1;
    } else if (e.type === 'stock-out') {
      const h = new Date(e.ts).getHours();
      tripsByHour[h] += 1;
    }
  });

  // v44 UX-8: filtra o gráfico pelo turno configurado, em vez de mostrar 24h cheias.
  // Lê de pcp.dailyPlans[hoje] ou pcp.shifts.padrao; cai em 7h-17h se nada existir.
  let startH = 7, endH = 17;
  try {
    const today = (typeof pcpTodayStr === 'function') ? pcpTodayStr() : new Date().toISOString().slice(0,10);
    const daily = State.pcp?.dailyPlans?.[today];
    const shift = State.pcp?.shifts?.padrao;
    const src = daily || shift;
    if (src) {
      const sH = parseInt(String(src.start||'07:00').split(':')[0], 10);
      const eH = parseInt(String(src.end  ||'17:00').split(':')[0], 10);
      if (!isNaN(sH)) startH = sH;
      if (!isNaN(eH)) endH = eH;
      // dá uma hora de folga em cada ponta para captar viagens nos extremos
      startH = Math.max(0, startH - 1);
      endH   = Math.min(23, endH + 1);
    }
  } catch(e) { /* mantém defaults */ }
  const hourRange = [];
  for (let h=startH; h<=endH; h++) hourRange.push(h);
  const labels = hourRange.map(h => String(h).padStart(2,'0')+'h');
  const data = hourRange.map(h => tripsByHour[h]);

  const ctxTrips = document.getElementById('chart-trips');

    if (_chartTrips) { try { _chartTrips.destroy(); } catch(e){} }

      data: {
        labels: labels,
        datasets: [{
          label: 'Viagens',
          data: data,
          backgroundColor: '#043f89',
          borderRadius: 4,
          barThickness: 'flex',
          maxBarThickness: 24,
        }]
      },
      options: {
        responsive: true, maintainAspectRatio: false,
        plugins: { legend: { display: false }, tooltip: { backgroundColor: '#043f89' } },
        scales: {
          x: { grid: { display: false }, ticks: { maxRotation: 0, autoSkip: true, autoSkipPadding: 4, color: '#64748b', font:{size:10} } },
          y: { beginAtZero: true, ticks: { precision: 0, color: '#64748b', font:{size:10} }, grid: { color: '#e5e7eb' } }
        }
      }
    });
  }

  // === Time distribution donut ===
  const states = Object.values(State.equipmentStates);
  const ops = states.filter(s => s.status === 'operating').length;
  const stp = states.filter(s => s.status === 'stopped').length;
  const mtn = states.filter(s => s.status === 'maintenance').length;
  const ofc = states.filter(s => s.status === 'oficina').length;
  const off = states.filter(s => s.status === 'off').length;
  const ctxTime = document.getElementById('chart-time');
  if (ctxTime) {
    if (_chartTime) { try { _chartTime.destroy(); } catch(e){} }
    _chartTime = new Chart(ctxTime, {
      type: 'doughnut',
      data: {
        labels: ['Operando','Parado','Manutenção','Oficina','Desligado'],
        datasets: [{
          data: [ops, stp, mtn, ofc, off],
          backgroundColor: ['#22c55e','#f97316','#ef4444','#a855f7','#cbd5e1'],
          borderColor: '#ffffff',
          borderWidth: 2,
        }]
      },
      options: {
        responsive: true, maintainAspectRatio: false, cutout: '60%',
        plugins: {
          legend: { position: 'bottom', labels: { color:'#475569', font:{size:11}, boxWidth:12, padding:10 } },
          tooltip: { backgroundColor: '#043f89' }
        }
      }
    });
  }

  // v45 — 5.4: toneladas por equipamento (hoje)
  const ctxTonsEq = document.getElementById('chart-tons-eq');
  if (ctxTonsEq) {
    if (_chartTonsEq) { try { _chartTonsEq.destroy(); } catch(e){} }
    const trucks = State.equipments.filter(e => e.kind === 'truck' || e.kind === 'loader');
    const tonsLabels = trucks.map(e => e.code);
    const tonsData = trucks.map(e => {
      const eqTrips = todayEv.filter(ev => (ev.type === 'trip' && ev.subtype === 'productive' || ev.type === 'stock-out') && getEventEquipmentId(ev) === e.id);
      return Math.round(eqTrips.reduce((a, ev) => a + (ev.tons || 0), 0) * 10) / 10;
    });
    const barColors = tonsData.map(v => v > 0 ? '#043f89' : '#e2e8f0');
    _chartTonsEq = new Chart(ctxTonsEq, {
      type: 'bar',
      data: {
        labels: tonsLabels,
        datasets: [{ label: 'Toneladas', data: tonsData, backgroundColor: barColors, borderRadius: 4, barThickness: 'flex', maxBarThickness: 28 }]
      },
      options: {
        responsive: true, maintainAspectRatio: false,
        plugins: { legend: { display: false }, tooltip: { backgroundColor: '#043f89', callbacks: { label: ctx => `${ctx.parsed.y} t` } } },
        scales: {
          x: { grid: { display: false }, ticks: { color: '#64748b', font: { size: 10 } } },
          y: { beginAtZero: true, ticks: { color: '#64748b', font: { size: 10 } }, grid: { color: '#e5e7eb' } }
        }
      }

  // v45 — 5.4: distribuição de motivos de parada (hoje)
  const ctxStops = document.getElementById('chart-stops');
  if (ctxStops) {
    if (_chartStops) { try { _chartStops.destroy(); } catch(e){} }
    const stopEvs = todayEv.filter(e => e.type === 'stop' && e.reason);

    const stopEntries = Object.entries(stopCounts).sort((a,b) => b[1]-a[1]).slice(0, 7);
    const palette = ['#043f89','#1e5bb0','#f4c718','#f97316','#22c55e','#a855f7','#ef4444'];
    if (stopEntries.length === 0) {

    } else {

        data: {
          labels: stopEntries.map(([r]) => r.length > 22 ? r.slice(0,20)+'…' : r),
          datasets: [{ data: stopEntries.map(([,c]) => c), backgroundColor: palette, borderColor: '#fff', borderWidth: 2 }]

        options: {
          responsive: true, maintainAspectRatio: false, cutout: '55%',

            legend: { position: 'bottom', labels: { color: '#475569', font: { size: 10 }, boxWidth: 10, padding: 6 } },

// Live timers — update only DOM nodes that have data-timer-start attribute
function tickLiveTimers() {
  const headerClock = document.getElementById('header-clock');
  if (headerClock) headerClock.textContent = fmtTimeShort(now());

  document.querySelectorAll('[data-timer-start]').forEach(el => {
    const startTs = el.getAttribute('data-timer-start');
    if (!startTs) return;
    const ms = Date.now() - new Date(startTs).getTime();
    el.textContent = fmtDuration(ms);
  });

  // britagem / rebritagem live (running stations)
  document.querySelectorAll('[data-timer-running]').forEach(el => {
    const key = el.getAttribute('data-timer-running');
    let s = null;
    if (State.tabletSession?.britagemStates?.[key]) s = State.tabletSession.britagemStates[key];
    else if (State.tabletSession?.rebritagemStates?.[key]) s = State.tabletSession.rebritagemStates[key];
    if (!s || !s.on) return;
    const live = s.totalMs + (Date.now() - new Date(s.lastOn).getTime());
    el.textContent = fmtDuration(live);
  });
}

// PCP v36 demo — Integração reforçada Tablet ⇄ PCP
// ============================================================
function pcpLocalDateStr(d=new Date()) {
  const y=d.getFullYear(), m=pcpPad(d.getMonth()+1), day=pcpPad(d.getDate());
  return `${y}-${m}-${day}`;
}
function pcpLocalMonthStr(d=new Date()) { return pcpLocalDateStr(d).slice(0,7); }
// v44.8 — consolidação: pcpTodayStr/pcpMonthStr originais (linha 4377/4381) já fazem
// o equivalente. Os patches v34 que ficavam aqui eram redundantes — removidos.

const __pcpEnsureV34Base = pcpEnsureV32;
pcpEnsureV32 = function() {
  const p = __pcpEnsureV34Base();
  p.version = 'v34-demo';
  if (!p.drilling) p.drilling = {};
  if (!p.drilling.hourlyJustifications) p.drilling.hourlyJustifications = {};
  if (!p.drilling.deviationReasons) p.drilling.deviationReasons = [
    'Rocha dura','Aguardando marcação','Troca de bit','Problema na perfuratriz','Deslocamento',
    'Chuva','Manutenção','Falta de frente','Plano de fogo alterado','Reunião / parada programada','Outro'
  ];
  if (!p.drilling.detonations) p.drilling.detonations = {};
  Object.keys(p.drilling.dailyPlans || {}).forEach(ds => pcpNormalizeDrillPlan(ds));
  return p;
};

function pcpNormalizeDrillPlan(dateStr) {
  const p = State.pcp || {};
  const d = p.drilling?.dailyPlans?.[dateStr];
  if (!d) return null;
  if (!Array.isArray(d.bits)) d.bits = [];
  if (!Array.isArray(d.drillIds)) d.drillIds = [];
  if (!d.intervalStart) d.intervalStart = '11:00';
  if (!d.intervalEnd) d.intervalEnd = '12:00';
  if (!d.start) d.start = p.shifts?.padrao?.start || '07:15';
  if (!d.end) d.end = p.shifts?.padrao?.end || '16:45';
  if (!d.effectiveHours) d.effectiveHours = pcpCalcEffectiveHours(d);
  d.holesPlanned = Number(d.holesPlanned) || 0;
  d.defaultHoleDepth = Number(d.defaultHoleDepth) || Number(p.drilling?.defaultHoleDepth || 12.5);
  if (!Array.isArray(d.plannedHoles)) d.plannedHoles = [];
  pcpEnsurePlannedHoles(d);
  return d;
}
function pcpEnsurePlannedHoles(cfg) {
  const wanted = Math.max(0, Number(cfg.holesPlanned)||0);
  const depth = Number(cfg.defaultHoleDepth)||12.5;
  while (cfg.plannedHoles.length < wanted) {
    const n = cfg.plannedHoles.length + 1;
    cfg.plannedHoles.push({ id:`H${pcpPad(n)}`, number:n, depth, status:'pendente', bit:null, startedAt:null, finishedAt:null });
  }
  if (cfg.plannedHoles.length > wanted) cfg.plannedHoles = cfg.plannedHoles.slice(0, wanted);
  cfg.plannedHoles.forEach((h,idx)=>{
    h.number = Number(h.number)||idx+1;
    h.id = h.id || `H${pcpPad(h.number)}`;
    if (!h.depth) h.depth = depth;
    if (!h.status) h.status = 'pendente';
  });
}

// v44.8 — pcpGetDailyDrillPlan consolidado: a chamada a pcpNormalizeDrillPlan
// foi movida para dentro da função original (linha ~4541).

function pcpGetTodayDrillPlan(eqId) {
  const cfg = pcpGetDailyDrillPlan(pcpTodayStr());
  const dp = pcpBuildDrillPlan(pcpTodayStr());
  const drill = findEquipment(eqId);
  const isPlanned = !cfg.drillIds?.length || cfg.drillIds.includes(eqId);
  const slots = (dp.hourlyDistribution || []).map(s => ({...s, targetMeters:(s.metersByDrill?.[eqId] || 0)}));
  const dailyTargetMeters = slots.reduce((a,s)=>a+(Number(s.targetMeters)||0),0);
  return { cfg, dp, drill, isPlanned, slots, dailyTargetMeters, rate: drill ? pcpDrillRate(drill) : 0 };
}

// v44.8 — pcpBuildDrillPlan consolidado na função original (linha 4550)

function pcpActualMetersForSlot(eqId,dateStr,slot) {
  const start = new Date(`${dateStr}T${slot.start}:00`), end = new Date(start.getTime()+(slot.minutes||60)*60000);
  return (State.events||[]).filter(e=>e.type==='furo'&&getEventEquipmentId(e)===eqId&&new Date(e.ts)>=start&&new Date(e.ts)<end).reduce((a,e)=>a+(Number(e.profundidade)||0),0);
}
function pcpDrillJustKey(dateStr,slotStart,eqId) { return `${dateStr}|DRILL|${slotStart}|${eqId}`; }
function pcpUnderTargetDrillSlots(eqId,dateStr=pcpTodayStr()) {
  const p=pcpEnsureV32(), plan=pcpGetTodayDrillPlan(eqId); if(!plan.isPlanned) return [];
  return plan.slots.filter(s=>s.targetMeters>0).map(s=>{
    const actual=pcpActualMetersForSlot(eqId,dateStr,s);
    const deficit=Math.max(0, (Number(s.targetMeters)||0) - actual);
    const key=pcpDrillJustKey(dateStr,s.start,eqId);
    return {...s, actualMeters:actual, deficitMeters:deficit, key, justification:p.drilling.hourlyJustifications[key]};
  }).filter(s=>s.deficitMeters>0.01 && !s.justification?.reason);
}
function pcpSaveDrillDeviation(key,reason,note='') {
  const p=pcpEnsureV32();
  p.drilling.hourlyJustifications[key]={reason,note,ts:new Date().toISOString(),operator:State.tabletSession?.operator?.name||State.managementUser?.name||'Sistema'};
  saveState();
}

// v44.8 — pcpGetTodayDrillBits consolidado na função original (linha 4558)

function pcpGetCurrentDrillHourTarget(eqId) {
  const dateStr=pcpTodayStr(), plan=pcpGetTodayDrillPlan(eqId);
  const now=new Date(), mins=now.getHours()*60+now.getMinutes();
  let slot=plan.slots.find(s=>mins>=pcpParseTimeToMin(s.start)&&mins<pcpParseTimeToMin(s.start)+(s.minutes||60));
  if(!slot) slot=plan.slots.find(s=>s.targetMeters>0)||{start:pcpMinToTime(now.getHours()*60),minutes:60,targetMeters:0};
  const actual=pcpActualMetersForSlot(eqId,dateStr,slot);
  return {...plan, slot:{...slot, actualMeters:actual, deficitMeters:Math.max(0,(slot.targetMeters||0)-actual)}};
}

function pcpNextPlannedHole(eqId) {
  const cfg = pcpGetDailyDrillPlan(pcpTodayStr());
  return (cfg.plannedHoles || []).find(h=>h.status!=='concluido') || null;
}

function tripLossEnsure(){
  const p = pcpEnsureV32 ? pcpEnsureV32() : (State.pcp = State.pcp || {});
  if (!Array.isArray(p.tripLossReasons)) p.tripLossReasons = tripLossSeedReasons();

  if (!p.tripLossPrompted) p.tripLossPrompted = {};
  if (!State.tabletSession) State.tabletSession = {};
  if (!Array.isArray(State.tabletSession.tripLossPendingKeys)) State.tabletSession.tripLossPendingKeys = [];
  // Migra motivos antigos simples para a nova lista, sem duplicar.
  const byId = new Map(p.tripLossReasons.map(r => [r.id, r]));
  tripLossSeedReasons().forEach(r => { if (!byId.has(r.id)) p.tripLossReasons.push(r); });
  return p;
}
function tripLossActiveReasons(){ return tripLossEnsure().tripLossReasons.filter(r => r.active !== false); }
function tripLossReasonById(id){ return tripLossEnsure().tripLossReasons.find(r => r.id === id); }
function tripLossEquipmentByCodeOrId(code){ if(!code) return null; return State.equipments.find(e => e.id===code || e.code===code); }
function tripLossPendingForTruck(eqId){
  const p=tripLossEnsure();
  const keys = State.tabletSession.tripLossPendingKeys || [];
  return keys.map(k => tripLossSlotByKey(k)).filter(x => x && x.eqId === eqId && !p.tripLossJustifications[x.key]?.reasonId && !p.hourlyJustifications?.[x.key]?.reason);
}
function tripLossSlotByKey(key){
  const [dateStr, start, eqId] = String(key||'').split('|');
  if(!dateStr || !start || !eqId) return null;
  try {
    const target = pcpGetTruckTargetForDate(eqId,dateStr);
    const slot = (target.slots||[]).find(s => s.start === start);
    if(!slot) return null;
    const actualTrips = pcpActualTripsForSlot(eqId,dateStr,slot);
    const deficitTrips = Math.max(0,(slot.targetTrips||0)-actualTrips);
    return {...slot,dateStr,eqId,key,actualTrips,deficitTrips,deficitTons:deficitTrips*(target.effectiveCapacity||0)};
  } catch(e) { return null; }
}
// v44.5 — Início do turno em minutos do dia (para ignorar horários anteriores ao
// momento em que o operador iniciou a parte diária). Retorna null se não houver
// turno em andamento (ex: contexto gerencial), caso em que nada é filtrado.
function shiftStartMinutesForToday(dateStr) {
  const ss = State.tabletSession?.shiftStartedAt;
  if (!ss) return null;
  const d = new Date(ss);
  if (isNaN(d.getTime())) return null;
  // Só aplica o filtro se o turno começou no mesmo dia consultado.
  const ssDate = pcpLocalDateStr(d);
  if (dateStr && ssDate !== dateStr) return null;
  return d.getHours() * 60 + d.getMinutes();
}
function tripLossCompletedUnderTargetSlots(eqId,dateStr=pcpTodayStr()){
  const p=tripLossEnsure();
  const tg=pcpGetTruckTargetForDate(eqId,dateStr);
  if(!tg.cal?.productive) return [];
  const now=new Date();
  // v44.5: ignora slots que terminaram ANTES do operador iniciar a parte diária.
  // Ex.: iniciou 10:12 → slots 07:15, 08:00 e 09:00 não são cobrados.
  const shiftStartMin = shiftStartMinutesForToday(dateStr);
  return (tg.slots||[]).filter(s => {
    const startMin = pcpParseTimeToMin(s.start);
    const dur = (s.minutes||60);
    const end = new Date(`${dateStr}T${s.start}:00`); end.setMinutes(end.getMinutes() + dur);
    if (s.targetTrips<=0 || end > now) return false;
    // se o slot terminou antes (ou no) início do turno, não cobra
    if (shiftStartMin != null && (startMin + dur) <= shiftStartMin) return false;
    return true;
  }).map(s => {
    const actualTrips=pcpActualTripsForSlot(eqId,dateStr,s);
    const key=pcpJustKey(dateStr,s.start,eqId);
    const justified = p.tripLossJustifications[key]?.reasonId || p.hourlyJustifications?.[key]?.reason;
    return {...s,dateStr,eqId,key,actualTrips,deficitTrips:Math.max(0,(s.targetTrips||0)-actualTrips),deficitTons:Math.max(0,(s.targetTrips||0)-actualTrips)*(tg.effectiveCapacity||0),justified};
  }).filter(s => s.deficitTrips>0 && !s.justified);
}
function tripLossCheckHourlyPrompt(){
  try {
    if (!State || State.currentView !== 'tablet' || State.currentScreen !== 'tablet-operational') return;
    const eq = findEquipment(State.tabletSession?.boundEquipmentId);
    if (!eq || eq.kind !== 'truck') return;
    const p = tripLossEnsure();
    const pending = tripLossCompletedUnderTargetSlots(eq.id, pcpTodayStr());
    if (!pending.length) return;
    const keys = new Set(State.tabletSession.tripLossPendingKeys || []);
    let changed = false;
    pending.forEach(s => { if(!keys.has(s.key)) { keys.add(s.key); changed=true; } });
    State.tabletSession.tripLossPendingKeys = Array.from(keys);
    const next = pending.find(s => !p.tripLossPrompted[s.key]);
    if (next && !State.modal) {
      p.tripLossPrompted[next.key] = new Date().toISOString();
      saveState();
      openModal('trip-loss-justify',{key:next.key,soft:true});
    } else if (changed) saveState();
  } catch(e) { console.warn('tripLossCheckHourlyPrompt', e); }
}

  ];
  window.tripLossSeedReasons = function(){
    return TRIP_LOSS_SEED_V37.map(([id,label,category,requiresEquipment,icon]) => ({id,label,category,requiresEquipment,icon,active:true}));
  };
  window.tripLossIsOldSpecificReason = function(r){
    if(!r) return false;
    const label = String(r.label||'');
    const id = String(r.id||'');
    return !!r.defaultRelatedEquipmentId || /\b(UC|UT|UR|UTC)-?\d{2}\b$/i.test(label) || /-(uc|ut|ur|utc)-?\d{2}$/i.test(id);
  };
})();

function tripLossEnsure(){
  const p = pcpEnsureV32 ? pcpEnsureV32() : (State.pcp = State.pcp || {});
  const seed = tripLossSeedReasons();
  const seedIds = new Set(seed.map(r=>r.id));
  const current = Array.isArray(p.tripLossReasons) ? p.tripLossReasons : [];
  const custom = current.filter(r => !seedIds.has(r.id) && !tripLossIsOldSpecificReason(r));
  const merged = [...seed];
  custom.forEach(r => merged.push({
    id: r.id || slugify(r.label||'motivo'),
    label: r.label || r.id || 'Motivo',
    category: r.category || 'Outros',
    requiresEquipment: !!r.requiresEquipment,
    icon: r.icon || '✏️',
    active: r.active !== false
  }));
  p.tripLossReasons = merged;
  if (!p.tripLossJustifications) p.tripLossJustifications = {};
  if (!p.tripLossPrompted) p.tripLossPrompted = {};
  if (!p.hourlyJustifications) p.hourlyJustifications = {};
  if (!State.tabletSession) State.tabletSession = {};
  if (!Array.isArray(State.tabletSession.tripLossPendingKeys)) State.tabletSession.tripLossPendingKeys = [];
  return p;
}
function tripLossActiveReasons(){ return tripLossEnsure().tripLossReasons.filter(r => r.active !== false); }
function tripLossReasonById(id){ return tripLossEnsure().tripLossReasons.find(r => r.id === id); }
function tripLossRelatedEquipmentOptions(){
  const myId = State.tabletSession?.boundEquipmentId;
  return (State.equipments||[]).filter(e => e.id !== myId);
}
function tripLossComposeReasonLabel(reason, relatedEquipmentId){
  if(!reason) return '';
  if(reason.requiresEquipment){
    const eq = findEquipment(relatedEquipmentId);
    return `${reason.label} ${eq?.code || relatedEquipmentId || ''}`.trim();
  }
  return reason.label;
}
function tripLossReasonTone(category){
  const c = String(category||'').toLowerCase();
  if(c.includes('manutenção')) return 'border-op-red/50 hover:border-op-red hover:bg-op-red/10 text-op-red';
  if(c.includes('desmonte')) return 'border-op-amber/60 hover:border-op-amber hover:bg-op-amber/10 text-op-amber';
  if(c.includes('clima')) return 'border-op-blue/50 hover:border-op-blue hover:bg-op-blue/10 text-op-blue';
  if(c.includes('infra')) return 'border-purple-500/50 hover:border-purple-500 hover:bg-purple-500/10 text-purple-300';
  if(c.includes('rotina')) return 'border-slate-400/50 hover:border-slate-300 hover:bg-slate-400/10 text-slate-200';
  return 'border-tablet-border hover:border-petra-yellow hover:bg-petra-yellow/10 text-tablet-text';
}

            class="w-10 h-10 rounded-xl bg-tablet-surface-2 hover:bg-tablet-surface-3 border border-tablet-border flex items-center justify-center flex-shrink-0 transition">${icon('user',22)}</button>

  const __tickLiveTimersV42 = window.tickLiveTimers || tickLiveTimers;

  if(typeof pcpLocalDateStr === 'function'){

  if(typeof pcpGetTruckTargetForDate === 'function'){
    window.pcpGetCurrentHourTarget = pcpGetCurrentHourTarget = function(eqId){
      const dateStr = pcpTodayStr();
      const tg = pcpGetTruckTargetForDate(eqId,dateStr);
      const dn = demoNow();
      const mins = dn.getHours()*60 + dn.getMinutes();
      let slot = (tg.slots||[]).find(s => mins >= pcpParseTimeToMin(s.start) && mins < pcpParseTimeToMin(s.start) + (s.minutes||60));

  window.tripLossEnsure = function(){ return tl42EnsureState(); };
  window.tripLossActiveReasons = function(){ return ensureArray(tl42EnsureState().tripLossReasons).filter(r => r && r.active !== false); };
  window.tripLossReasonById = function(id){ return tripLossActiveReasons().find(r => r.id === id) || ensureArray(tl42EnsureState().tripLossReasons).find(r => r.id === id); };

  window.tripLossCompletedUnderTargetSlots = function(eqId,dateStr=pcpTodayStr()){
    const p = tl42EnsureState();
    const tg = pcpGetTruckTargetForDate(eqId,dateStr);
    if(!tg.cal?.productive) return [];
    // v44.6: no modo "Demais Serviços" não se cobra justificativa de viagem perdida.
    // Só vale quando o equipamento em sessão é este e o modo é demais.
    if (State.tabletSession?.boundEquipmentId === eqId && State.tabletSession?.truckMode === 'demais') return [];
    const dn = demoNow();
    // v44.5: ignora slots que terminaram antes do início da parte diária do operador.
    // Ex.: iniciou 10:12 → 07:15, 08:15, 09:15 (todos terminam ≤10:12) não são cobrados.
    const shiftStartMin = (typeof shiftStartMinutesForToday === 'function') ? shiftStartMinutesForToday(dateStr) : null;
    return ensureArray(tg.slots).filter(s => {
      const end = new Date(`${dateStr}T${s.start}:00`);
      end.setMinutes(end.getMinutes() + (s.minutes||60));
      if (!(Number(s.targetTrips||0) > 0 && end <= dn)) return false;
      if (shiftStartMin != null) {
        const startMin = pcpParseTimeToMin(s.start), dur = (s.minutes||60);
        if ((startMin + dur) <= shiftStartMin) return false;

      return true;
    }).map(s => {

      const key = pcpJustKey(dateStr,s.start,eqId);

    };

  function stepTop(slot, eq){
    return `<div class="bg-op-amber text-petra-blue px-4 py-3 rounded-t-3xl flex items-center justify-between gap-3 flex-shrink-0 tl42-no-select">
      <div class="flex items-center gap-3 min-w-0"><span class="text-4xl flex-shrink-0">⚠️</span><div class="min-w-0"><div class="display-font tl42-title truncate">Justificar perda de viagens</div><div class="tl42-sub font-black opacity-85 truncate">${h(eq?.code||slot.eqId)} · ${h(slot.start)} · faltaram ${Number(slot.deficitTrips||0)} viagem(ns)</div></div></div>
      <button onclick="tripLossPostpone(${jsArg(slot.key)})" class="tl42-top-btn px-5 rounded-2xl bg-petra-blue/15 hover:bg-petra-blue/25 font-black text-base whitespace-nowrap flex-shrink-0">Depois</button>
    </div>`;
  }
  function stepStats(slot){
    return `<div class="grid grid-cols-3 gap-2 px-4 pt-2 flex-shrink-0 text-center tl42-hide-short">
      <div class="bg-tablet-bg rounded-2xl p-2 border-2 border-tablet-border"><div class="hairline text-tablet-text-dim text-[10px]">Meta</div><div class="display-font text-2xl">${Number(slot.targetTrips||0)}</div></div>
      <div class="bg-tablet-bg rounded-2xl p-2 border-2 border-tablet-border"><div class="hairline text-tablet-text-dim text-[10px]">Real</div><div class="display-font text-2xl text-op-red">${Number(slot.actualTrips||0)}</div></div>
      <div class="bg-tablet-bg rounded-2xl p-2 border-2 border-tablet-border"><div class="hairline text-tablet-text-dim text-[10px]">Perda</div><div class="display-font text-2xl text-op-amber">${fmtNumber(slot.deficitTons,0)}t</div></div>
    </div>`;
  }
  function footer(back=true){
    return `<div class="px-4 py-3 flex gap-3 flex-shrink-0 border-t border-tablet-border bg-tablet-bg">
      ${back?`<button onclick="tl42Back()" class="flex-1 py-4 rounded-2xl bg-tablet-surface-2 hover:bg-tablet-surface-3 border-2 border-tablet-border font-black text-xl">← Voltar</button>`:''}
      <button onclick="tripLossPostpone(State.modal.params.key)" class="flex-1 py-4 rounded-2xl bg-tablet-surface-2 hover:bg-tablet-surface-3 border-2 border-tablet-border font-black text-xl text-tablet-text-dim">Depois</button>
    </div>`;
  }
  function categoryStep(slot, eq, groups){
    return `<div class="flex-1 min-h-0 p-4 overflow-hidden flex flex-col">
      <div class="mb-3 flex-shrink-0"><div class="hairline text-petra-yellow text-base">Etapa 1 de 3</div><div class="display-font tl42-step">Toque na categoria</div></div>
      <div class="tl42-grid tl42-category-grid flex-1 min-h-0">
        ${groups.map(([cat,reasons]) => { const m=tripLossCategoryMeta(cat); return `<button onclick="tl42Category(${jsArg(cat)})" class="tl42-card bg-tablet-surface-2 hover:bg-tablet-surface-3 border-tablet-border hover:border-petra-yellow p-4 text-left flex items-center gap-4 tl42-action-btn"><span class="text-5xl flex-shrink-0">${m.icon}</span><div class="min-w-0"><div class="display-font tl42-label">${h(m.title)}</div><div class="tl42-small text-petra-yellow font-black mt-1">${reasons.length} motivo(s)</div></div></button>`; }).join('')}
      </div>
    </div>`;
  }
  function reasonStep(slot, eq, d, groups){
    const g = groups.find(([cat]) => cat === d.category) || groups[0] || ['Outros',[]];
    const m = tripLossCategoryMeta(g[0]);
    return `<div class="flex-1 min-h-0 p-4 overflow-hidden flex flex-col">
      <div class="mb-3 flex items-center justify-between gap-3 flex-shrink-0"><div class="min-w-0"><div class="hairline text-petra-yellow text-base">Etapa 2 de 3</div><div class="display-font tl42-step truncate">${m.icon} ${h(m.title)}</div></div><button onclick="tl42Back()" class="tl42-top-btn px-5 rounded-2xl bg-tablet-surface-2 border-2 border-tablet-border font-black text-lg flex-shrink-0">← Categorias</button></div>
      <div class="tl42-grid tl42-reason-grid tl42-scroll flex-1 min-h-0">
        ${g[1].map(r => `<button onclick="tl42Reason(${jsArg(r.id)})" class="tl42-card bg-tablet-surface-2 border-tablet-border hover:border-petra-yellow hover:bg-petra-yellow/10 p-4 text-left flex items-center gap-4 tl42-action-btn"><span class="text-5xl flex-shrink-0">${r.icon||'•'}</span><span class="display-font tl42-label min-w-0">${h(r.label)}</span></button>`).join('')}
      </div>
    </div>${footer(true)}`;
  }
  function equipmentStep(slot, eq, selected){
    return `<div class="flex-1 min-h-0 p-4 overflow-hidden flex flex-col">
      <div class="mb-3 flex items-center justify-between gap-3 flex-shrink-0"><div class="min-w-0"><div class="hairline text-petra-yellow text-base">Etapa 3 de 3</div><div class="display-font tl42-step">Onde foi?</div><div class="tl42-sub text-tablet-text-dim font-black truncate">${h(selected?.label||'')}</div></div><button onclick="tl42Back()" class="tl42-top-btn px-5 rounded-2xl bg-tablet-surface-2 border-2 border-tablet-border font-black text-lg flex-shrink-0">← Motivos</button></div>
      <div class="grid grid-cols-1 md:grid-cols-2 gap-5 flex-1 min-h-0">
        <button onclick="tl42Own(${jsArg(eq?.id||'')})" class="tl42-card bg-op-green/15 hover:bg-op-green/25 border-op-green text-op-green p-7 text-left flex flex-col justify-center"><div class="text-7xl mb-3">🚛</div><div class="hairline text-base opacity-80">Meu equipamento</div><div class="display-font text-5xl leading-none truncate">${h(eq?.code||'')}</div></button>
        <button onclick="tl42OtherList()" class="tl42-card bg-tablet-surface-2 hover:bg-tablet-surface-3 border-tablet-border hover:border-petra-yellow p-7 text-left flex flex-col justify-center"><div class="text-7xl mb-3">🔁</div><div class="hairline text-base text-tablet-text-dim">Outro equipamento</div><div class="display-font text-4xl leading-none">Selecionar</div></button>
      </div>
    </div>${footer(true)}`;
  }
  function equipmentListStep(slot, eq){
    const options = tripLossRelatedEquipmentOptions();
    return `<div class="flex-1 min-h-0 p-4 overflow-hidden flex flex-col">
      <div class="mb-3 flex items-center justify-between gap-3 flex-shrink-0"><div><div class="hairline text-petra-yellow text-base">Outro equipamento</div><div class="display-font tl42-step">Qual equipamento?</div></div><button onclick="tl42Back()" class="tl42-top-btn px-5 rounded-2xl bg-tablet-surface-2 border-2 border-tablet-border font-black text-lg flex-shrink-0">← Voltar</button></div>
      <div class="tl42-grid tl42-equipment-grid tl42-scroll flex-1 min-h-0">
        ${options.map(e => `<button onclick="tl42Eq(${jsArg(e.id)})" class="tl42-card bg-tablet-surface-2 hover:bg-petra-blue/20 border-tablet-border hover:border-petra-yellow p-3 text-center flex flex-col items-center justify-center tl42-action-btn"><div class="text-4xl mb-1">${e.icon||'🔧'}</div><div class="display-font text-3xl leading-none truncate w-full">${h(e.code)}</div><div class="tl42-small text-tablet-text-dim font-black truncate w-full mt-1">${h(e.name||'')}</div></button>`).join('')}
      </div>
    </div>${footer(true)}`;
  }
  function confirmStep(slot, eq, selected, d){
    const label = tripLossComposeReasonLabel(selected, d.relatedEquipmentId);
    const rel = d.relatedEquipmentId ? findEquipment(d.relatedEquipmentId) : null;
    return `<div class="flex-1 min-h-0 p-4 overflow-hidden flex flex-col">
      <div class="mb-3 flex items-center justify-between gap-3 flex-shrink-0"><div><div class="hairline text-petra-yellow text-base">Finalizar</div><div class="display-font tl42-step">Confirmar?</div></div><button onclick="tl42Back()" class="tl42-top-btn px-5 rounded-2xl bg-tablet-surface-2 border-2 border-tablet-border font-black text-lg flex-shrink-0">← Alterar</button></div>
      <div class="flex-1 min-h-0 grid grid-cols-1 md:grid-cols-2 gap-5">
        <div class="bg-tablet-bg border-2 border-tablet-border rounded-3xl p-6 flex flex-col justify-center overflow-hidden"><div class="text-7xl mb-3">${selected?.icon||'⚠️'}</div><div class="hairline text-tablet-text-dim text-base">Motivo</div><div class="display-font text-4xl leading-tight mt-2">${h(label)}</div>${rel?`<div class="mt-4 text-2xl font-black text-petra-yellow truncate">Equipamento: ${h(rel.code)}</div>`:''}</div>
        <button onclick="tripLossSaveJustification(${jsArg(slot.key)})" class="tl42-card bg-op-green hover:bg-op-green-dark border-op-green text-white p-6 flex flex-col items-center justify-center text-center"><div class="text-8xl mb-4">✅</div><div class="display-font text-5xl leading-none">SALVAR</div><div class="text-xl font-black mt-3">Enviar para o painel</div></button>
      </div>
    </div>${footer(true)}`;
  }

  window.modalTripLossJustify = function(params={}){
    const slot = tripLossSlotByKey(params.key);
    if(!slot) return `<div class="p-6"><div class="font-black text-xl">Pendência não encontrada.</div><button onclick="closeModal()" class="mt-4 px-4 py-3 bg-tablet-surface-2 rounded-lg font-bold">Fechar</button></div>`;
    const eq = findEquipment(slot.eqId);
    const d = draftFor(slot.key);
    const groups = tripLossGroupedReasons();
    const selected = d.reasonId ? tripLossReasonById(d.reasonId) : null;
    let content = '';
    if(d.step === 'reason') content = reasonStep(slot, eq, d, groups);
    else if(d.step === 'equipment') content = equipmentStep(slot, eq, selected);
    else if(d.step === 'equipment-list') content = equipmentListStep(slot, eq);
    else if(d.step === 'confirm') content = confirmStep(slot, eq, selected, d);
    else content = categoryStep(slot, eq, groups);
    return `<div class="tl42-shell">${stepTop(slot,eq)}${stepStats(slot)}${content}</div>`;
  };

  const __renderModalV42 = window.renderModal || renderModal;
  window.renderModal = renderModal = function(){
    if(State && State.modal && State.modal.type === 'trip-loss-justify'){
      const body = modalTripLossJustify(State.modal.params||{});
      return `<div class="fixed inset-0 z-50 modal-backdrop flex items-center justify-center p-1 animate-fade-in"><div class="bg-tablet-surface border-2 border-tablet-border text-tablet-text rounded-3xl shadow-2xl w-full tl42-main animate-slide-up" style="max-width:1240px;">${body}</div></div>`;
    }
    return __renderModalV42();
  };

  const __openModalV42 = window.openModal || openModal;
  window.openModal = openModal = function(type, params={}){
    if(type === 'trip-loss-justify'){
      const p = tl42EnsureState();
      if(!p.tripLossDraft || p.tripLossDraft.key !== params.key) p.tripLossDraft = null;
    }
    return __openModalV42(type, params);
  };

  const __loadStateV42 = window.loadState || loadState;
  window.loadState = loadState = function(){
    const result = __loadStateV42();
    try{ tl42EnsureState(); saveState(); }catch(e){ console.warn('v42 migration failed', e); }
    return result;
  };

  try{ tl42EnsureState(); saveState(); if (typeof render === 'function') render(); }catch(e){ console.warn('v42 init', e); }
  console.log('%cPetra v44: tablet em movimento, hora demo e perda de viagem em etapas','font-weight:bold;color:#f4c718;background:#043f89;padding:6px 12px;border-radius:4px;');
})();
</script>

</body>
</html>
