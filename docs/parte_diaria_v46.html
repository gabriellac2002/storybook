<head>
<meta charset="UTF-8">

<title>Petra Agregados — Sistema Operacional v46</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;500;600;700;800;900&family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">

<script>
tailwind.config = {
  theme: {
    extend: {
      fontFamily: {
        display: ['Archivo', 'sans-serif'],
        sans: ['DM Sans', 'sans-serif'],
        mono: ['JetBrains Mono', 'monospace'],
      },
      colors: {
        petra: { blue: '#043f89', 'blue-dark': '#032f66', 'blue-light': '#1e5bb0', yellow: '#f4c718', 'yellow-dark': '#d9ad0a' },
        tablet: { bg: '#0f1115', surface: '#1a1c23', 'surface-2': '#252834', 'surface-3': '#2f3340', border: '#3a3d4a', 'border-light': '#4a4d5a', text: '#f5f5f7', 'text-dim': '#9ca3af', 'text-muted': '#6b7280' },
        op: { green: '#22c55e', 'green-dark': '#16a34a', red: '#ef4444', 'red-dark': '#dc2626', orange: '#f97316', 'orange-dark': '#ea580c', amber: '#f4c718', blue: '#3b82f6', 'blue-dark': '#2563eb', purple: '#a855f7' }
      },
      animation: { 'fade-in': 'fadeIn 0.25s ease-out', 'slide-up': 'slideUp 0.3s ease-out' },
      keyframes: {
        fadeIn: { '0%': { opacity: '0' }, '100%': { opacity: '1' } },
        slideUp: { '0%': { opacity: '0', transform: 'translateY(12px)' }, '100%': { opacity: '1', transform: 'translateY(0)' } },
      }
    }
  }
}
</script>
<style>
* { -webkit-tap-highlight-color: transparent; }
html, body { font-family: 'DM Sans', sans-serif; font-size: 17px; }
body { background: #0f1115; overflow: hidden; }
body.body-scroll-allowed { overflow: auto; }
::-webkit-scrollbar { width: 10px; height: 10px; }
::-webkit-scrollbar-track { background: #1a1c23; }
::-webkit-scrollbar-thumb { background: #3a3d4a; border-radius: 6px; }
::-webkit-scrollbar-thumb:hover { background: #4a4d5a; }
.light-theme ::-webkit-scrollbar-track { background: #f1f3f5; }
.light-theme ::-webkit-scrollbar-thumb { background: #cbd5e1; }
.display-font { font-family: 'Archivo', sans-serif; font-weight: 800; letter-spacing: -0.02em; }
.mono-font { font-family: 'JetBrains Mono', monospace; }
.hairline { letter-spacing: 0.1em; text-transform: uppercase; font-size: 0.82rem; font-weight: 700; }
.logo-blue-tint { filter: invert(13%) sepia(96%) saturate(2497%) hue-rotate(212deg) brightness(91%) contrast(101%); }
/* [EXTRACTED: TabletButton]
   Componente: components/tablet/TabletButton.tsx
   Story: stories/tablet/TabletButton.stories.tsx
   Data: 2026-06-25 */
.tablet-btn { min-height: 80px; font-size: 1.3rem; }
.tablet-btn-lg { min-height: 110px; font-size: 1.7rem; }
.tablet-btn-xl { min-height: 140px; font-size: 2rem; }
/* [EXTRACTED: StatusDot]
   Componente: components/petra/StatusDot.tsx
   Story: stories/petra/StatusDot.stories.tsx
   Data: 2026-06-25 */
.status-dot { display: inline-block; width: 10px; height: 10px; border-radius: 50%; box-shadow: 0 0 0 0 currentColor; animation: dot-pulse 2s infinite; }
.status-dot.fast { animation-duration: 1s; }
@keyframes dot-pulse { 0% { box-shadow: 0 0 0 0 currentColor; } 70% { box-shadow: 0 0 0 8px transparent; } 100% { box-shadow: 0 0 0 0 transparent; } }
input[type=number]::-webkit-inner-spin-button, input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
input[type=number] { -moz-appearance: textfield; }
.card-hoverable { transition: transform 0.15s ease, box-shadow 0.15s ease, border-color 0.15s ease; }
.card-hoverable:hover { transform: translateY(-2px); }
.big-timer { font-family: 'JetBrains Mono', monospace; font-weight: 700; font-variant-numeric: tabular-nums; letter-spacing: -0.02em; }
.progress-bar { transition: width 0.4s ease; }
.modal-backdrop { background: rgba(0,0,0,0.7); backdrop-filter: blur(4px); overflow-y: auto; -webkit-overflow-scrolling: touch; }
.modal-content-wrap { display: flex; align-items: flex-start; justify-content: center; min-height: 100%; padding: 2vh 1rem; }

/* Tablet light theme (operator can toggle) */
.tablet-light { background: #eef2f7 !important; color: #111827; }
.tablet-light .bg-tablet-bg { background-color: #e4eaf3 !important; }
.tablet-light .bg-tablet-surface { background-color: #ffffff !important; box-shadow: 0 1px 4px rgba(0,0,0,0.08); }
.tablet-light .bg-tablet-surface\/50 { background-color: rgba(255,255,255,0.7) !important; }
.tablet-light .bg-tablet-surface-2 { background-color: #dde5f0 !important; }
.tablet-light .bg-tablet-surface-3 { background-color: #ccd6e8 !important; }
.tablet-light .text-tablet-text { color: #111827 !important; }
.tablet-light .text-white { color: #111827 !important; }
.tablet-light .text-tablet-text-dim { color: #374151 !important; }
.tablet-light .text-tablet-text-muted { color: #6b7280 !important; }
.tablet-light .border-tablet-border { border-color: #b8c8de !important; }
.tablet-light .border-tablet-border-light { border-color: #94a8c4 !important; }
.tablet-light .text-petra-yellow { color: #92650a !important; }
.tablet-light .mono-font { color: #1e3a5f !important; }
.tablet-light input, .tablet-light textarea, .tablet-light select {
  background-color: #ffffff !important;
  border-color: #94a8c4 !important;
  color: #111827 !important;
}
.tablet-light input::placeholder, .tablet-light textarea::placeholder { color: #9ca3af !important; }
.tablet-light .bg-op-green { background-color: #16a34a !important; color: #fff !important; }
.tablet-light .bg-op-red { background-color: #dc2626 !important; color: #fff !important; }
.tablet-light .bg-op-orange { background-color: #ea580c !important; color: #fff !important; }
.tablet-light .text-op-green { color: #15803d !important; }
.tablet-light .text-op-red { color: #b91c1c !important; }
.tablet-light .text-op-orange { color: #c2410c !important; }
.tablet-light .text-op-amber { color: #92400e !important; }
.tablet-light .bg-petra-blue { background-color: #043f89 !important; color: white !important; }
.tablet-light .bg-petra-blue .text-petra-yellow,
.tablet-light .bg-petra-blue .text-tablet-text-dim,
.tablet-light .bg-petra-blue * { color: white !important; }
.tablet-light .bg-petra-blue .text-petra-yellow { color: #f4c718 !important; }
.tablet-light .big-timer { color: #1e3a5f !important; }
/* v45 — 4.5: Modo alto contraste — uso sob sol forte na cabine */
.tablet-hc { background: #000000 !important; color: #ffffff; }
.tablet-hc .bg-tablet-bg, .tablet-hc .bg-tablet-surface, .tablet-hc .bg-tablet-surface-2, .tablet-hc .bg-tablet-surface-3 { background-color: #111111 !important; border-color: #ffffff !important; }
.tablet-hc .bg-tablet-surface { box-shadow: 0 0 0 2px #ffffff !important; }
.tablet-hc .text-tablet-text, .tablet-hc .text-white { color: #ffffff !important; }
.tablet-hc .text-tablet-text-dim { color: #e5e5e5 !important; }
.tablet-hc .text-tablet-text-muted { color: #cccccc !important; }
.tablet-hc .border-tablet-border, .tablet-hc .border-tablet-border-light { border-color: #ffffff !important; }
.tablet-hc .text-petra-yellow { color: #ffe066 !important; }
.tablet-hc .mono-font { color: #ffffff !important; }
.tablet-hc .bg-petra-blue { background-color: #003080 !important; border: 2px solid #ffffff !important; }
.tablet-hc .bg-petra-yellow { background-color: #ffe066 !important; color: #000 !important; }
.tablet-hc .bg-op-green { background-color: #00cc44 !important; color: #000 !important; border: 2px solid #fff !important; }
.tablet-hc .bg-op-red   { background-color: #ff2222 !important; color: #fff !important; border: 2px solid #fff !important; }
.tablet-hc .bg-op-orange{ background-color: #ff8800 !important; color: #000 !important; border: 2px solid #fff !important; }
.tablet-hc .text-op-green { color: #00ff66 !important; }
.tablet-hc .text-op-red   { color: #ff4444 !important; }
.tablet-hc .text-op-amber, .tablet-hc .text-op-orange { color: #ffaa00 !important; }
.tablet-hc .big-timer { color: #ffe066 !important; font-size: 1.15em !important; }
.tablet-hc input, .tablet-hc textarea, .tablet-hc select { background: #000 !important; color: #fff !important; border: 2px solid #fff !important; }
.tablet-hc button { font-size: 1.05em !important; font-weight: 900 !important; }
.stripe-danger { background-image: repeating-linear-gradient(45deg, #ef4444 0 12px, #1a1c23 12px 24px); }
.demo-bar { background: linear-gradient(90deg, #f4c718 0%, #f4c718 50%, #1a1c23 50%, #1a1c23 100%); background-size: 16px 100%; background-repeat: repeat-x; height: 4px; }
.mgmt-bg { background: #f7f8fa; color: #1f2937; }
.mgmt-card { background: #ffffff; border: 1px solid #e5e7eb; }
.dot-green { color: #22c55e; background: #22c55e; }
.dot-orange { color: #f97316; background: #f97316; }
.dot-red { color: #ef4444; background: #ef4444; }
.dot-gray { color: #6b7280; background: #6b7280; }
.dot-purple { color: #a855f7; background: #a855f7; }
/* Strong touch feedback for all interactive elements on tablet */
button:active { filter: brightness(0.78) !important; transform: scale(0.97) !important; }
/* Toast notification — v44.1 (melhor legibilidade em tablet, posição acima do footer) */
#toast { position: fixed; bottom: 88px; left: 50%; transform: translateX(-50%) translateY(20px); z-index: 200; padding: 16px 28px; border-radius: 16px; font-weight: 700; font-size: 1.0625rem; line-height: 1.35; pointer-events: none; opacity: 0; transition: opacity 0.25s, transform 0.25s; max-width: 92vw; text-align: center; box-shadow: 0 10px 40px rgba(0,0,0,0.45); }
#toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
#toast.toast-ok   { background: #16a34a; color: #fff; }
#toast.toast-err  { background: #dc2626; color: #fff; }
/* v45 — 4.1: loading overlay para ações que demoram (export, backup, PDF) */
#loading-overlay { display:none; position:fixed; inset:0; z-index:500; background:rgba(4,63,137,0.72); align-items:center; justify-content:center; flex-direction:column; gap:16px; }
#loading-overlay.active { display:flex; }
#loading-overlay .spin { width:52px; height:52px; border:5px solid rgba(255,255,255,0.25); border-top-color:#f4c718; border-radius:50%; animation:petra-spin 0.8s linear infinite; }
#loading-overlay .spin-msg { color:#fff; font-weight:700; font-size:1rem; letter-spacing:.02em; }
@keyframes petra-spin { to { transform: rotate(360deg); } }
#toast.toast-info { background: #2563eb; color: #fff; }
#toast.toast-warn { background: #f59e0b; color: #1f2937; }
/* Quando NÃO há footer (tela de login/seleção), toast pode descer */
body.no-op-footer #toast { bottom: 32px; }
/* Confirm overlay (replaces native confirm()) */
#confirm-overlay { position: fixed; inset: 0; z-index: 300; background: rgba(0,0,0,0.75); backdrop-filter: blur(6px); display: flex; align-items: center; justify-content: center; padding: 24px; }
#confirm-overlay .confirm-box { background: #1a1c23; border: 2px solid #3a3d4a; border-radius: 20px; padding: 32px 28px; max-width: 440px; width: 100%; box-shadow: 0 20px 60px rgba(0,0,0,0.6); }
/* Checklist pending item pulse */
@keyframes pending-glow { 0%,100% { border-color: rgba(244,199,24,0.35); } 50% { border-color: rgba(244,199,24,0.75); } }
.checklist-pending { animation: pending-glow 2.5s ease-in-out infinite; }
/* v44.1 — Empty states padronizados (lista vazia, sem eventos, etc) */
.empty-state { display:flex; flex-direction:column; align-items:center; justify-content:center; padding:32px 16px; text-align:center; color:#9ca3af; gap:8px; }
.empty-state .empty-icon { font-size:2.5rem; line-height:1; opacity:0.5; }
.empty-state .empty-title { font-size:0.9rem; font-weight:700; letter-spacing:.05em; text-transform:uppercase; color:#d1d5db; }
.empty-state .empty-sub { font-size:0.8rem; color:#6b7280; }
.empty-state-compact { display:flex; flex-direction:column; align-items:center; justify-content:center; padding:12px; text-align:center; color:#9ca3af; gap:4px; }
.empty-state-compact .empty-icon { font-size:1.5rem; opacity:0.5; }
.empty-state-compact .empty-title { font-size:0.78rem; font-weight:700; letter-spacing:.04em; text-transform:uppercase; color:#9ca3af; }

/* ════════════════════════════════════════════════════════════════
   v44.2 — Modais ricos (parada / encerrar turno / observação)
   ════════════════════════════════════════════════════════════════ */
/* Header com gradiente sutil + status indicator */
.rich-modal-header { position:relative; padding:18px 22px; border-radius:18px 18px 0 0; overflow:hidden; }
.rich-modal-header::before { content:''; position:absolute; inset:0; background:linear-gradient(135deg, rgba(255,255,255,0.12) 0%, transparent 60%); pointer-events:none; }
.rich-modal-header.danger { background:linear-gradient(135deg, #ea580c 0%, #c2410c 100%); color:#fff; }
.rich-modal-header.warning { background:linear-gradient(135deg, #d97706 0%, #b45309 100%); color:#fff; }
.rich-modal-header.info { background:linear-gradient(135deg, #1d4ed8 0%, #1e3a8a 100%); color:#fff; }
.rich-modal-header.success { background:linear-gradient(135deg, #16a34a 0%, #15803d 100%); color:#fff; }
.rich-modal-header.neutral { background:linear-gradient(135deg, #334155 0%, #1e293b 100%); color:#fff; }

/* Status dot pulsando (para "AO VIVO") */
@keyframes live-pulse-dot { 0%,100% { opacity:1; transform:scale(1);} 50% { opacity:.5; transform:scale(.7);} }
.live-dot { display:inline-block; width:10px; height:10px; border-radius:50%; background:#fff; animation: live-pulse-dot 1.2s infinite ease-in-out; box-shadow:0 0 8px rgba(255,255,255,.8); }

/* Timer XL pulsando (parada ativa) */
@keyframes timer-pulse { 0%,100% { color:#fed7aa;} 50% { color:#fff;} }
.timer-xl-live { font-variant-numeric:tabular-nums; font-size:3rem; font-weight:900; line-height:1; letter-spacing:.02em; font-family:'JetBrains Mono','Courier New',monospace; animation: timer-pulse 1.6s ease-in-out infinite; }

/* Stat chips (cards menores em linha) */
.stat-chip { background:rgba(255,255,255,.07); border:1px solid rgba(255,255,255,.12); border-radius:14px; padding:10px 12px; display:flex; flex-direction:column; gap:2px; min-width:0; }
.stat-chip .stat-label { font-size:.65rem; text-transform:uppercase; letter-spacing:.08em; color:rgba(255,255,255,.6); font-weight:700; }
.stat-chip .stat-value { font-size:1.4rem; font-weight:900; line-height:1.1; }
.stat-chip .stat-sub { font-size:.7rem; color:rgba(255,255,255,.55); }
.stat-chip.danger .stat-value { color:#fca5a5; }
.stat-chip.warn .stat-value { color:#fde68a; }
.stat-chip.ok .stat-value { color:#86efac; }

/* Reason category buttons (grid de motivos com ícone grande) */
.reason-btn {
  position:relative; display:flex; flex-direction:column; align-items:center; justify-content:center;
  gap:6px; padding:14px 8px; min-height:96px; border-radius:16px; font-weight:800;
  background:rgba(255,255,255,.05); border:2px solid rgba(255,255,255,.08); color:#e5e7eb;
  text-align:center; transition:all .15s ease; overflow:hidden;
}
.reason-btn:hover { background:rgba(255,255,255,.09); }
.reason-btn:active { transform:scale(.97); }
.reason-btn .reason-icon { font-size:2rem; line-height:1; }
.reason-btn .reason-label { font-size:.82rem; line-height:1.15; letter-spacing:.02em; }
.reason-btn.selected { background:rgba(34,197,94,.18); border-color:#22c55e; color:#fff; box-shadow:0 0 0 4px rgba(34,197,94,.18); }
.reason-btn.selected::after { content:'✓'; position:absolute; top:6px; right:8px; font-size:1.1rem; color:#22c55e; font-weight:900; }
.reason-btn.special { background:rgba(244,199,24,.15); border-color:rgba(244,199,24,.45); color:#fde68a; }
.reason-btn.special.selected { background:rgba(244,199,24,.28); border-color:#f4c718; color:#fff; box-shadow:0 0 0 4px rgba(244,199,24,.25); }
.reason-btn.special.selected::after { color:#f4c718; }

/* History row (lista de eventos passados) */
.history-row { display:flex; align-items:center; gap:10px; padding:8px 10px; border-radius:10px; background:rgba(255,255,255,.03); font-size:.85rem; }
.history-row .h-time { font-family:'JetBrains Mono',monospace; font-weight:700; color:#9ca3af; min-width:90px; }
.history-row .h-dur  { font-weight:800; color:#fde68a; }
.history-row .h-label { flex:1; min-width:0; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; color:#d1d5db; }

/* Timeline visual do turno (encerramento) */
.shift-timeline { position:relative; padding:8px 0; }
.shift-timeline .tl-axis { position:absolute; left:0; right:0; height:6px; top:50%; transform:translateY(-50%); background:#1e293b; border-radius:6px; overflow:hidden; }
.shift-timeline .tl-block { position:absolute; top:0; bottom:0; }
.shift-timeline .tl-block.operating { background:#22c55e; }
.shift-timeline .tl-block.stopped { background:#f97316; }
.shift-timeline .tl-block.off { background:#475569; }
.shift-timeline .tl-marker { position:absolute; top:-4px; bottom:-4px; width:2px; background:#fff; }
.shift-timeline .tl-marker::after { content:attr(data-label); position:absolute; top:-22px; left:50%; transform:translateX(-50%); font-size:.65rem; color:#9ca3af; font-family:'JetBrains Mono',monospace; white-space:nowrap; }

/* Slide-to-confirm (encerrar turno) */
.slide-confirm { position:relative; height:64px; background:#1e293b; border-radius:32px; overflow:hidden; user-select:none; }
.slide-confirm-track { position:absolute; inset:0; display:flex; align-items:center; justify-content:center; font-weight:800; color:rgba(255,255,255,.45); letter-spacing:.1em; text-transform:uppercase; font-size:.85rem; pointer-events:none; }
.slide-confirm-thumb { position:absolute; top:4px; left:4px; width:56px; height:56px; border-radius:50%; background:#043f89; color:#fff; display:flex; align-items:center; justify-content:center; font-size:1.4rem; cursor:grab; touch-action:none; transition:background .2s; box-shadow:0 4px 12px rgba(0,0,0,.4); }
.slide-confirm-thumb:active { cursor:grabbing; }
.slide-confirm.armed .slide-confirm-thumb { background:#16a34a; }
.slide-confirm.completed { background:#16a34a; }
.slide-confirm.completed .slide-confirm-track { color:#fff; }

/* v44.7 — Banner offline (top do operacional) */
.offline-banner {
  display:flex; align-items:center; justify-content:center; gap:8px;
  background:linear-gradient(90deg, #b45309 0%, #d97706 50%, #b45309 100%);
  color:#fff; font-weight:800; font-size:.78rem; letter-spacing:.05em;
  text-transform:uppercase; padding:6px 12px; line-height:1;
  border-bottom:2px solid #f59e0b;
  animation: offline-shimmer 3s linear infinite;
  background-size:200% 100%;
}
@keyframes offline-shimmer { 0%{background-position:0% 0%;} 100%{background-position:200% 0%;} }
/* Char counter para textareas */
.char-counter { font-size:.7rem; color:#6b7280; text-align:right; margin-top:4px; font-family:'JetBrains Mono',monospace; }
.char-counter.warn { color:#f59e0b; }
.char-counter.err { color:#ef4444; }

/* Animação modal entry mais suave */
@keyframes modal-rich-in { from { opacity:0; transform:translateY(20px) scale(.97);} to { opacity:1; transform:translateY(0) scale(1);} }
.modal-rich-anim { animation: modal-rich-in .22s cubic-bezier(.16,1,.3,1) both; }

/* Section heading dentro do modal */
.modal-section { background:rgba(255,255,255,.03); border:1px solid rgba(255,255,255,.06); border-radius:14px; padding:12px 14px; }
.modal-section-title { font-size:.72rem; letter-spacing:.1em; text-transform:uppercase; color:#9ca3af; font-weight:800; display:flex; align-items:center; gap:8px; margin-bottom:8px; }
.modal-section-title::before { content:''; width:3px; height:14px; background:#f4c718; border-radius:2px; }
/* v43 — wizard de saída de estoque para tablet em movimento */
.tl43-stock-wizard{height:100%;display:flex;flex-direction:column;background:#1a1c23;color:#f5f5f7;}
.tl43-wizard-head{height:76px;flex-shrink:0;background:#16a34a;color:#fff;display:flex;align-items:center;justify-content:space-between;padding:14px 20px;border-radius:16px 16px 0 0;}
.tl43-close{width:54px;height:54px;border-radius:16px;background:rgba(255,255,255,.18);font-size:1.8rem;font-weight:900;}
.tl43-wizard-crumbs{height:48px;display:grid;grid-template-columns:repeat(4,1fr);gap:8px;padding:8px 14px;background:#0f1115;border-bottom:1px solid #3a3d4a;flex-shrink:0;}
.tl43-wizard-crumbs div{display:flex;align-items:center;justify-content:center;border-radius:12px;background:#252834;color:#9ca3af;font-size:.78rem;font-weight:900;text-transform:uppercase;letter-spacing:.06em;white-space:nowrap;}
.tl43-wizard-crumbs div.active{background:#043f89;color:#fff;box-shadow:0 0 0 2px rgba(244,199,24,.45) inset;}
.tl43-wizard-crumbs div.done{color:#22c55e;}
.tl43-wizard-body{flex:1;min-height:0;padding:18px;display:flex;flex-direction:column;gap:16px;overflow:hidden;}
.tl43-step-title{display:flex;align-items:center;gap:14px;flex-shrink:0;background:#252834;border:1px solid #3a3d4a;border-radius:18px;padding:14px 18px;}
.tl43-step-title>span{font-size:2.4rem;line-height:1;}
.tl43-step-title b{font-size:1.55rem;line-height:1.1;display:block;}
.tl43-step-title small{display:block;margin-top:4px;color:#9ca3af;font-size:.95rem;}
.tl43-choice-grid{flex:1;min-height:0;display:grid;gap:14px;align-content:stretch;}
.tl43-choice-grid.two{grid-template-columns:repeat(2,minmax(0,1fr));}

// v44.7 — UX helpers para tablet industrial
// ════════════════════════════════════════════════════════════════════════════
// Vibração curta (haptic) — feedback tátil quando o operador toca em ações
// importantes. Crítico em obra com luva, onde o tato é prejudicado.
// Funciona em Android/Chrome; iOS Safari ignora silenciosamente (sem erro).
function hapticTap()   { try { navigator.vibrate && navigator.vibrate(15); } catch(e){} }
function hapticOk()    { try { navigator.vibrate && navigator.vibrate([20, 40, 30]); } catch(e){} }
function hapticErr()   { try { navigator.vibrate && navigator.vibrate([40, 80, 40, 80, 40]); } catch(e){} }
function hapticHeavy() { try { navigator.vibrate && navigator.vibrate(60); } catch(e){} }

// v45 — 6.1: validação numérica unificada com suporte a PT-BR (vírgula decimal).
// Usar em TODOS os inputs numéricos em vez de parseFloat/parseInt direto.
// Retorna { ok: true, value: number } ou { ok: false, error: string }.
// Parâmetros opcionais: min, max, inteiro (true = só aceita inteiros).
function parseNumberPtBr(raw, { min=0, max=Infinity, inteiro=false } = {}) {
  if (raw == null || String(raw).trim() === '') return { ok: false, error: 'Campo obrigatório.' };
  const v = parseFloat(String(raw).trim().replace(',', '.'));
  if (isNaN(v)) return { ok: false, error: 'Valor inválido. Use apenas números.' };
  if (inteiro && !Number.isInteger(v)) return { ok: false, error: 'Informe um número inteiro.' };
  if (v < min) return { ok: false, error: `Valor mínimo: ${min}.` };
  if (v > max) return { ok: false, error: `Valor máximo: ${max}.` };
  return { ok: true, value: v };
}

// Status de conexão (online/offline) — operador precisa saber se está
// trabalhando offline (sincronização pendente quando voltar).
let _isOnline = (typeof navigator !== 'undefined' && navigator.onLine !== false);
if (typeof window !== 'undefined') {
  window.addEventListener('online',  () => { _isOnline = true;  try { notify(); } catch(e){} });
  window.addEventListener('offline', () => { _isOnline = false; try { notify(); } catch(e){} });
}
function isOnline() { return _isOnline; }


// ── Loading overlay — v45 4.1 ─────────────────────────────────────────────
function showLoading(msg = 'Aguarde…') {
  const el = document.getElementById('loading-overlay');
  const msgEl = document.getElementById('loading-msg');
  if (!el) return;
  if (msgEl) msgEl.textContent = msg;
  el.classList.add('active');
}
function hideLoading() {
  const el = document.getElementById('loading-overlay');
  if (el) el.classList.remove('active');
}

// ── Toast ──────────────────────────────────────────────────────────────────
let _toastTimer = null;
function toast(msg, type='ok', ms=2800) {
  const el = document.getElementById('toast');
  if (!el) return;
  el.textContent = msg;
  el.className = `show toast-${type}`;
  clearTimeout(_toastTimer);
  _toastTimer = setTimeout(() => { el.className = el.className.replace('show','').trim(); }, ms);
  if (type === 'err') hapticErr(); else if (type === 'ok') hapticTap();
}

// ── Confirm custom (replaces native confirm()) ────────────────────────────
function showConfirm(msg, onYes, labelYes='Confirmar', labelNo='Cancelar', danger=false) {
  const overlay = document.getElementById('confirm-overlay');
  overlay.style.display = 'flex';
  overlay.innerHTML = `
    <div class="confirm-box">

function render() {
  const root = document.getElementById('app');
  try {
    let body = '';
    if (State.currentView === 'management') body = renderManagement();
    else body = renderTablet();
    const isTabletLight = State.currentView === 'tablet' && State.tabletTheme === 'light';
    const isTabletHc    = State.currentView === 'tablet' && State.tabletTheme === 'hc';
    const mainClasses = State.currentView === 'management'
      ? 'mgmt-bg light-theme min-h-screen'
      : isTabletHc    ? 'tablet-hc min-h-screen'
      : isTabletLight ? 'tablet-light min-h-screen'
      : 'bg-tablet-bg min-h-screen';
    root.innerHTML = renderHeader() + `<main id="main-content" class="${mainClasses}">${body}</main>` + renderModal();
    postRenderHooks();
    // Body overflow management — tablet operational locks scroll for fixed-screen UX
    const isOperational = State.currentView === 'tablet' && State.currentScreen === 'tablet-operational';
    document.body.classList.toggle('body-scroll-allowed', !isOperational);
    // v44.1 UI: toast position adapts — sobe quando há footer de botões, desce em login/seletor
    document.body.classList.toggle('no-op-footer', !isOperational);
    // v44.7 — esconder splash de boot no primeiro render bem-sucedido
    const splash = document.getElementById('boot-splash');
    if (splash) {
      splash.style.opacity = '0';
      setTimeout(() => splash.remove(), 380);
    }
  } catch(err) {
    console.error('Render error, falling back to login:', err);
    // Clear potentially corrupted state and go back to login
    if (State && State.tabletSession) {
      State.modal = null;
      State.currentScreen = 'tablet-login';
      State.tabletSession.operator = null;
      saveState();
    }
    root.innerHTML = `<div style="display:flex;align-items:center;justify-content:center;min-height:100vh;flex-direction:column;gap:16px;color:#f5f5f7;">
      <div style="color:#f59e0b;">${icon('warning',56)}</div>
      <div style="font-weight:bold;font-size:1.2rem;">Erro ao carregar — redirecionando...</div>
      <div style="color:#9ca3af;font-size:0.875rem;">${err.message||''}</div>
    </div>`;
    setTimeout(() => { State = buildInitialState(); saveState(); location.reload(); }, 2000);
  }
}

// v44.4 — MODO DEMO: senha opcional
// Se a senha for deixada em branco, o login funciona mesmo assim.
// - Senha preenchida → valida normalmente (comportamento de produção).
// - Senha em branco + usuário informado → entra com aquele usuário.
// - Usuário E senha em branco → entra com o primeiro usuário do papel pedido
//   (admin pega o admin; operador pega o primeiro operador).
// Para reativar a obrigatoriedade de senha, basta definir DEMO_PASSWORD_OPTIONAL = false.
// ════════════════════════════════════════════════════════════════
const DEMO_PASSWORD_OPTIONAL = true;
function demoFindOperator(username, password, requireAdmin) {
  const u = (username || '').trim();
  const p = password || '';
  const roleOk = (o) => requireAdmin ? o.role === 'admin' : true;

  // Caminho de produção: usuário + senha corretos
  if (u && p) {
    const exact = State.operators.find(o => o.username === u && o.password === p && roleOk(o));
    if (exact) return exact;
    // se senha não bate mas o modo demo está ligado, ainda tenta sem senha abaixo
    if (!DEMO_PASSWORD_OPTIONAL) return null;
  }

  if (!DEMO_PASSWORD_OPTIONAL) {
    // modo estrito: precisa de match exato (já testado acima)
    return State.operators.find(o => o.username === u && o.password === p && roleOk(o)) || null;
  }

  // Modo demo, senha em branco (ou não confere):
  if (u) {
    // usuário informado → entra com ele (se existir e tiver o papel)
    const byUser = State.operators.find(o => o.username === u && roleOk(o));
    if (byUser) return byUser;
    // usuário digitado não existe → cai no fallback por papel
  }
  // sem usuário (ou usuário inválido) → primeiro do papel pedido
  return State.operators.find(o => roleOk(o)) || null;
}

function doTabletLogin() {
  const u = document.getElementById('tlogin-user').value.trim();
  const p = document.getElementById('tlogin-pass').value;
  const op = demoFindOperator(u, p, false);
  const errEl = document.getElementById('tlogin-error');
  if (!op) { errEl.textContent = 'Usuário ou senha incorretos.'; errEl.classList.remove('hidden'); return; }
  if (!State.tabletSession.boundEquipmentId) {
    if (op.role !== 'admin') { errEl.textContent = 'Tablet ainda não vinculado. Solicite ao administrador.'; errEl.classList.remove('hidden'); return; }
    State.tabletSession.operator = op; saveState(); navigate('tablet-equipment'); return;
  }
  State.tabletSession.operator = op;
  State.tabletSession.shiftStartedAt = new Date().toISOString();
  State.tabletSession.checklistDone = false;
  State.tabletSession.checklistResult = null;
  State.tabletSession.checklistDraft = null;
  State.tabletSession.initialHorimeter = null;
  State.tabletSession.initialHorimeters = null;
  saveState(); navigate('tablet-checklist');
}

function renderTabletEquipmentBinding() {
  const op = State.tabletSession.operator;

            `).join('')}

      </div>

  `;

function setChecklistStatus(id, status) { const d = getChecklistDraft(); d[id] = { ...(d[id]||{}), status }; saveState(); render(); }
// v44 UX-6: confirmar INAPTO quando o item é crítico (freio, cinto, mandíbulas, etc).
// Já está marcado? Permite trocar para apto direto; senão, confirma antes de bloquear.
function setChecklistInapt(id, critical, label) {
  const d = getChecklistDraft();
  if (d[id]?.status === 'inapto') {
    // já está inapto — toque duplo não muda nada, mantém o estado
    return;
  }
  if (critical) {
    showConfirm(
      `Marcar "${label}" como INAPTO?\n\nEsse é um item CRÍTICO e provavelmente vai bloquear a operação. Confirme apenas se o defeito for real.`,
      () => setChecklistStatus(id, 'inapto'),
      '✕ Sim, está inapto',
      'Cancelar',
      true
    );
    return;
  }
  setChecklistStatus(id, 'inapto');
}
function setChecklistDesc(id, desc) { const d = getChecklistDraft(); d[id] = { ...(d[id]||{}), desc }; saveState(); }
function submitChecklist() {
  const draft = getChecklistDraft();
  const eq = findEquipment(State.tabletSession.boundEquipmentId);
  const checklistItems = getChecklistItems(eq);
  const missing = checklistItems.filter(i => !draft[i.id] || !draft[i.id].status);
  if (missing.length) { toast(`⚠ Faltam ${missing.length} item(s): ${missing.map(m=>m.label).join(', ')}`, 'err', 4000); return; }
  const noDesc = checklistItems.filter(i => draft[i.id]?.status === 'inapto' && !draft[i.id]?.desc?.trim());
  if (noDesc.length) { toast(`Descreva o defeito dos itens INAPTOS: ${noDesc.map(m=>m.label).join(', ')}`, 'err', 4000); return; }
  const op = State.tabletSession.operator;
  const issues = [];
  checklistItems.forEach(item => {
    if (draft[item.id].status === 'inapto') {
      issues.push({ item:item.label, desc:draft[item.id].desc.trim(), critical:item.critical });
      pushEvent({ type:'alert-maintenance', equipment:eq.id, operator:op.name, text:`[CHECKLIST] ${item.label}: ${draft[item.id].desc.trim()}`, tag: item.critical ? 'Checklist crítico':'Checklist', resolved:false });
    }
  });
  pushEvent({ type:'checklist', equipment:eq.id, operator:op.name, allOk:issues.length===0, issues });
  const criticalFail = checklistItems.some(i => i.critical && draft[i.id].status === 'inapto');
  State.tabletSession.checklistDone = true;
  State.tabletSession.checklistResult = { issues, completedAt: new Date().toISOString() };
  State.tabletSession.checklistDraft = null;
  if (criticalFail) {
    State.tabletSession.blocked = true;
    State.tabletSession.blockReason = issues.filter(i => i.critical).map(i => `${i.item}: ${i.desc}`).join(' · ');
    State.equipmentStates[eq.id] = { ...State.equipmentStates[eq.id], status:'maintenance', operator:null, since:new Date().toISOString(), alertText: State.tabletSession.blockReason };
    saveState(); notify(); navigate('tablet-blocked'); return;
  }
  saveState(); notify(); navigate('tablet-horimeter');
}

function horimAdjust(field, delta) {
  const el = document.getElementById('horim-' + field);
  if (!el) return;
  const v = parseFloat(el.value) || 0;
  el.value = Math.max(0, v + delta).toFixed(1);
}
function submitHorimeter(kind, subtype) {
  const eq = findEquipment(State.tabletSession.boundEquipmentId);
  // v44.1 HORIM-1: aceita vírgula brasileira ("8420,5") em vez de só ponto.
  // Operador no campo digita com vírgula; parseFloat("8420,5") = 8420 (perde decimais).
  const get = (f) => {
    const raw = String(document.getElementById(`horim-${f}`).value || '').replace(',', '.');
    return parseFloat(raw);
  };
  // v44.1 HORIM-1: detecta valor absurdamente alto. Se o operador esqueceu a vírgula
  // ("84205" em vez de "8420,5"), o horímetro sobe 75.000h num turno — impossível,
  // mas o validador antigo aceitava porque > último. Limite: 24h por dia desde
  // o último registro (super-conservador, dá margem para até 1 mês sem registro).
  const MAX_HOURS_PER_DAY = 24;
  const checkJump = (label, val, last) => {
    if (!last || last <= 0) return true;            // sem histórico, permite qualquer valor
    const diff = val - last;
    if (diff > MAX_HOURS_PER_DAY * 30) {             // > 30 dias de operação em 1 turno?
      toast(`Horímetro ${label} (${val}h) muito acima do último (${last}h). Verifique se faltou a vírgula.`, 'err', 5000);
      return false;
    }
    return true;
  };
  // Validação de mínimo
  if (kind === 'drill' && subtype === 'hidraulica') {
    const motor = get('motor'), martelo = get('martelo');
    if (isNaN(motor) || isNaN(martelo)) { toast('Horímetro inválido. Use números (vírgula ou ponto).', 'err'); return; }
    if (motor < (eq.lastHorimeter||0)) { toast(`Horímetro Motor (${motor}h) abaixo do último registrado (${eq.lastHorimeter}h).`, 'err'); return; }
    if (martelo < (eq.lastMartelo||0)) { toast(`Horímetro Martelo (${martelo}h) abaixo do último registrado (${eq.lastMartelo}h).`, 'err'); return; }
    if (!checkJump('Motor', motor, eq.lastHorimeter)) return;
    if (!checkJump('Martelo', martelo, eq.lastMartelo)) return;
    State.tabletSession.initialHorimeters = { motor, martelo };
  } else if (kind === 'britagem-primaria') {
    const alim = get('alimentador'), brit = get('britador');
    if (isNaN(alim) || isNaN(brit)) { toast('Horímetro inválido. Use números (vírgula ou ponto).', 'err'); return; }
    if (alim < (eq.lastHorimeterAlim||0)) { toast(`Horímetro Alimentador (${alim}h) abaixo do registrado (${eq.lastHorimeterAlim}h).`, 'err'); return; }
    if (brit < (eq.lastHorimeterBrit||0)) { toast(`Horímetro Britador (${brit}h) abaixo do registrado (${eq.lastHorimeterBrit}h).`, 'err'); return; }
    if (!checkJump('Alimentador', alim, eq.lastHorimeterAlim)) return;
    if (!checkJump('Britador', brit, eq.lastHorimeterBrit)) return;
    State.tabletSession.initialHorimeters = { alimentador:alim, britador:brit };
    if (!State.tabletSession.britagemStates) State.tabletSession.britagemStates = { alimentadorPrim:{on:false,totalMs:0,lastOn:null}, britadorPrim:{on:false,totalMs:0,lastOn:null} };
  } else if (kind === 'rebritagem') {
    const keys = ['alimSec','britSec','alimTer','britTer','alimQua','britQua','peneira1','peneira2','peneira3'];
    const obj = {};
    for (const k of keys) {
      const val = get(k);
      if (isNaN(val)) { toast(`Horímetro ${k} inválido.`, 'err'); return; }
      const last = eq.lastHorimeters?.[k] ?? 0;
      if (val < last) { toast(`Horímetro ${k} (${val}h) abaixo do registrado (${last}h).`, 'err'); return; }
      if (!checkJump(k, val, last)) return;
      obj[k] = val;
    }
    State.tabletSession.initialHorimeters = obj;
    if (!State.tabletSession.rebritagemStates) { State.tabletSession.rebritagemStates = {}; keys.forEach(k => State.tabletSession.rebritagemStates[k] = { on:false, totalMs:0, lastOn:null }); }
  } else {
    const val = get('horimeter');
    if (isNaN(val)) { toast('Horímetro inválido. Use números (vírgula ou ponto).', 'err'); return; }
    if (val < (eq.lastHorimeter||0)) { toast(`Horímetro (${val}h) abaixo do último registrado (${eq.lastHorimeter}h).`, 'err'); return; }
    if (!checkJump('', val, eq.lastHorimeter)) return;
    State.tabletSession.initialHorimeter = val;
  }
  State.equipmentStates[eq.id] = { status:'operating', operator:State.tabletSession.operator.name, since:new Date().toISOString(), shiftStart:State.tabletSession.shiftStartedAt||new Date().toISOString(), tripsToday:0, tonsToday:0, litersToday:0, loadsToday:0 };
  if (kind === 'drill' && !State.tabletSession.drillBits) {
    State.tabletSession.drillBits = (typeof pcpGetTodayDrillBits === 'function') ? pcpGetTodayDrillBits(eq.id) : [{n:1,meters:0,hastes:0,punhos:0,luvas:0},{n:2,meters:0,hastes:0,punhos:0,luvas:0},{n:3,meters:0,hastes:0,punhos:0,luvas:0},{n:4,meters:0,hastes:0,punhos:0,luvas:0}];
  }
  saveState(); notify(); navigate('tablet-operational');
}

function renderTabletOperational() {
  const eq = findEquipment(State.tabletSession.boundEquipmentId);
  if (eq.kind === 'excavator' && !State.tabletSession.excavatorImplement) return renderImplementSelect(eq);
  // v44.5: caminhão escolhe o modo (Produção ou Demais Serviços) antes de operar.
  if (eq.kind === 'truck' && !State.tabletSession.truckMode) return renderTruckModeSelect(eq);
  let body = '';
  if (eq.kind === 'truck')                  body = renderTruckOps(eq);
  else if (eq.kind === 'loader')            body = renderLoaderOps(eq);
  else if (eq.kind === 'excavator')         body = renderExcavatorOps(eq);
  else if (eq.kind === 'support')           body = renderSupportOps(eq);
  else if (eq.kind === 'pipa')              body = renderPipaOps(eq);
  else if (eq.kind === 'drill')             body = renderDrillOps(eq);
  else if (eq.kind === 'motorgrader')       body = renderMotorgraderOps(eq);
  else if (eq.kind === 'britagem-primaria') body = renderBritagemPrimariaOps(eq);

// ===== TRUCK (UT) =====
function getTruckHourlyStats(ev, eq) {
  const current = pcpGetCurrentHourTarget(eq.id);
  const slot = current.slot;
  const currentHour = parseInt((slot.start || '00:00').split(':')[0]) || new Date().getHours();
  const parts = (slot.start || (pcpPad(new Date().getHours())+':00')).split(':').map(Number);
  const start = new Date(); start.setHours(parts[0]||0, parts[1]||0, 0, 0);
  const end = new Date(start.getTime() + (slot.minutes||60)*60000);
  const hourTrips = ev.filter(t => t.type === 'trip' && new Date(t.ts) >= start && new Date(t.ts) < end);
  const hourProd = hourTrips.filter(t => t.subtype === 'productive').length;
  const HOUR_GOAL = slot.targetTrips || 0;
  const hourPct = HOUR_GOAL > 0 ? Math.min(100, Math.round(hourProd / HOUR_GOAL * 100)) : 0;
  return { hourProd, HOUR_GOAL, hourPct, currentHour, slotStart: slot.start, effectiveCapacity: current.effectiveCapacity };
}

function cancelLastTrip() {
  const eq = findEquipment(State.tabletSession.boundEquipmentId);
  const trips = getTodayEvents(eq.id).filter(e => e.type === 'trip');
  if (!trips.length) { toast('Nenhum basculamento para cancelar.', 'err'); return; }
  const last = trips[0];
  const label = last.subtype === 'productive' ? 'BASCULAMENTO NO PRIMÁRIO' : 'DECAPE';
  showConfirm(
    `Cancelar o último basculamento\n${label} registrado às ${fmtTimeShort(last.ts)}?`,
    () => {
      const idx = State.events.findIndex(e => e.id === last.id);
      if (idx !== -1) State.events.splice(idx, 1);
      const es = State.equipmentStates[eq.id];
      if (last.subtype === 'productive') {
        es.tripsToday = Math.max(0, (es.tripsToday||0)-1);
        es.tonsToday = Math.max(0, (es.tonsToday||0)-(last.tons||0));
      }
      saveState(); toast('Basculamento cancelado.', 'ok'); render();
    },
    '↩ Sim, cancelar', 'Não cancelar', true
  );
}
function registerTrip(subtype) {
  // v44 UX-1: anti-duplo-toque. O botão fica em cooldown por 3s; o estado também
  // é guardado em window para sobreviver a render() durante o intervalo.
  const COOLDOWN_MS = 3000;
  const lastTs = window._petraLastTripTs || 0;
  const sinceLast = Date.now() - lastTs;
  if (sinceLast < COOLDOWN_MS) {
    toast(`Aguarde ${Math.ceil((COOLDOWN_MS - sinceLast)/1000)}s antes de registrar outra viagem.`, 'info', 1600);
    return;
  }
  window._petraLastTripTs = Date.now();

  const eq = findEquipment(State.tabletSession.boundEquipmentId);
  const op = State.tabletSession.operator;
  const pcpTarget = pcpGetTodayTruckTarget(eq.id);
  const tons = pcpTarget.effectiveCapacity || eq.capacity;
  pushEvent({ type:'trip', equipment:eq.id, operator:op.name, subtype, tons, pcpCapacity: tons });
  const es = State.equipmentStates[eq.id];
  if (subtype === 'productive') {
    es.tripsToday = (es.tripsToday||0)+1;
    es.tonsToday  = (es.tonsToday||0)+tons;
    toast(`📦 Produtivo registrado · ${fmtNumber(tons,0)}t`, 'ok', 2000);
    hapticOk();
  } else {
    toast('🪨 Estéril registrado', 'info', 2000);
    hapticTap();
  }
  saveState(); notify(); render();

  // v44 UX-2: flash visual de confirmação no painel de contadores
  // (e cooldown nos botões para evitar duplo registro acidental)
  requestAnimationFrame(() => {
    const panel = document.getElementById('truck-counters-panel');
    if (panel) { panel.classList.remove('flash-success'); void panel.offsetWidth; panel.classList.add('flash-success'); }
    document.querySelectorAll('[data-trip-btn]').forEach(b => {
      b.classList.add('trip-cooldown');
      setTimeout(() => b.classList.remove('trip-cooldown'), COOLDOWN_MS);
    });
  });
}

function confirmStockOut() {
  const draft = State.tabletSession.loaderDraft || {};
  const eq = findEquipment(State.tabletSession.boundEquipmentId);
  const op = State.tabletSession.operator;
  if (!eq || !op) { toast('Sessão inválida. Faça login novamente.', 'err'); return; }
  if (!draft.material) { toast('Selecione o produto.', 'err'); return; }
  // v44: B5 — atomicidade: o draft não pode estar em estado inconsistente
  // (useConchas=true E truckType setado simultaneamente).
  if (draft.useConchas && draft.truckType) {
    console.warn('[confirmStockOut] Draft inconsistente (useConchas + truckType). Limpando truckType.', draft);
    draft.truckType = null;
  }
  let tons = 0;
  let truckType = null;
  let conchas = null;
  if (draft.useConchas) {
    conchas = Number(draft.conchas || 0);
    if (conchas <= 0) { toast('Informe a quantidade de conchas.', 'err'); return; }
    tons = conchas * TONS_PER_CONCHA;
    truckType = 'Conchas';
  } else {
    const t = State.truckTypes.find(x => x.name === draft.truckType);
    if (!t) { toast('Selecione o tipo de caminhão.', 'err'); return; }
    tons = Number(t.tons || 0);
    truckType = t.name;
  }
  pushEvent({ type:'stock-out', equipment:eq.id, operator:op.name, material:draft.material, truckType, conchas, tons });
  const matOut = State.materials.find(m=>m.name===draft.material || m.id===draft.material);
  if (matOut) {
    if (!State.stockLevels) State.stockLevels = {};
    if (!State.stockLevels[matOut.id]) State.stockLevels[matOut.id] = { balance:0, target:DEFAULT_STOCK_TARGET, lastUpdated:null };
    State.stockLevels[matOut.id].balance = Math.max(0,(State.stockLevels[matOut.id].balance||0) - tons);
    State.stockLevels[matOut.id].lastUpdated = new Date().toISOString();
  }
  State.tabletSession.loaderDraft = null;
  saveState(); notify(); closeModal();
  toast('📤 Saída registrada: '+fmtNumber(tons,0)+' t', 'ok');
}

function startFuro(furo, bit, profundidade, plannedHoleId=null) {
  State.tabletSession.activeFurao = { startTs:new Date().toISOString(), furo, bitNumber:bit, profundidade, plannedHoleId };
  const cfg = pcpGetDailyDrillPlan(pcpTodayStr());
  const hole = (cfg.plannedHoles||[]).find(h=>h.id===plannedHoleId);
  if (hole) { hole.status='em andamento'; hole.startedAt=State.tabletSession.activeFurao.startTs; hole.bit=bit; }

function finishFuro() {
  const a = State.tabletSession.activeFurao; if (!a) return;
  const eq = findEquipment(State.tabletSession.boundEquipmentId);
  const op = State.tabletSession.operator;
  const end = new Date().toISOString();
  pushEvent({ type:'furo', equipment:eq.id, equipmentId:eq.id, operator:op.name, furo:a.furo, plannedHoleId:a.plannedHoleId||null, bitNumber:a.bitNumber, profundidade:a.profundidade, start:a.startTs, end, duration:Date.now()-new Date(a.startTs).getTime() });
  const bits = State.tabletSession.drillBits || [];
  const bit = bits.find(b => Number(b.n) === Number(a.bitNumber));
  if (bit) bit.meters = (bit.meters||0) + Number(a.profundidade||0);
  const cfg = pcpGetDailyDrillPlan(pcpTodayStr());
  const hole = (cfg.plannedHoles||[]).find(h=>h.id===a.plannedHoleId);
  if (hole) { hole.status='concluido'; hole.finishedAt=end; hole.actualDepth=Number(a.profundidade)||0; hole.bit=a.bitNumber; }
  State.tabletSession.activeFurao = null;
  saveState(); notify(); render();
}

            class="flex-shrink-0 flex items-center justify-center gap-2 font-black text-sm bg-op-amber/30 hover:bg-op-amber/50 text-op-amber transition"
            style="height: 48px;">
            ${icon('warning',14)} EVENTO
          </button>
        </div>
      `;
    }
  }

  return `
    <div class="h-full flex flex-col gap-2">

      <!-- Barra de informações do turno -->
      ${renderTurnoInfoBar(eq)}

      <!-- Status geral -->
      <div class="flex-shrink-0 flex items-center justify-between bg-tablet-surface-2 border border-tablet-border rounded-xl px-4 py-2">
        <div class="flex items-center gap-3">
          <span class="status-dot ${onCount === totalCount ? 'dot-green fast' : onCount > 0 ? 'dot-orange fast' : 'dot-gray'}"></span>
          <span class="font-bold text-base">Rebritagem</span>
          <span class="hairline text-sm ${onCount === totalCount ? 'text-op-green' : onCount > 0 ? 'text-op-orange' : 'text-tablet-text-dim'}">
            ${onCount}/${totalCount} equipamentos ligados
          </span>
        </div>
        <button onclick='openModal("britagem-event", { equip: "rebritagem" })' class="px-4 py-2 bg-op-amber/20 border border-op-amber/40 hover:bg-op-amber/30 transition rounded-lg font-bold text-op-amber text-sm flex items-center gap-1.5">${icon('warning',16)} Evento Geral</button>
      </div>

      <!-- Grid britadores (2 colunas × 3 linhas) -->
      <div class="grid grid-cols-2 gap-2" style="flex: 3; min-height: 0;">
        ${britadores.map(r => rebritCard(r)).join('')}
      </div>

      <!-- Grid peneiras (3 colunas) -->
      <div class="grid grid-cols-3 gap-2" style="flex: 2; min-height: 0;">
        ${peneiras.map(r => rebritCard(r)).join('')}
      </div>

      <!-- Rodapé: parada + obs + encerrar -->
      <div class="flex gap-2 flex-shrink-0" style="height: 80px;">
        <button onclick="openModal('parada')"
          class="flex-1 rounded-xl font-black flex flex-row items-center justify-center gap-3 transition
            ${stopActive ? 'bg-op-orange animate-pulse ring-2 ring-op-orange/40' : 'bg-op-orange hover:bg-op-orange-dark'}">
          <span aria-hidden="true">${stopActive ? icon('warning', 26) : icon('pause', 26)}</span>
          <div>
            <div class="font-black text-base leading-tight">${stopActive ? 'PARADA ATIVA' : 'PARADA'}</div>
            ${stopActive && stopStartTs ? `<div class="big-timer text-sm" data-timer-start="${stopStartTs}">${fmtDuration(Date.now()-new Date(stopStartTs).getTime())}</div>` : '<div class="text-xs opacity-70">Registrar parada</div>'}
          </div>
        </button>
        <button onclick="openModal('alert-maintenance')" class="flex-1 bg-tablet-surface-2 hover:bg-tablet-surface-3 border border-tablet-border transition rounded-xl font-black flex flex-col items-center justify-center gap-1">
          <span class="text-op-red">${icon('wrench',22)}</span><span class="text-xs hairline text-tablet-text-dim">OBS. MANUT.</span>
        </button>
        <button onclick="openModal('alert-production')" class="flex-1 bg-tablet-surface-2 hover:bg-tablet-surface-3 border border-tablet-border transition rounded-xl font-black flex flex-col items-center justify-center gap-1">
          <span class="text-op-amber">${icon('rock',22)}</span><span class="text-xs hairline text-tablet-text-dim">OBS. PROD.</span>
        </button>
        <button onclick="openModal('observation')" class="flex-1 bg-tablet-surface-2 hover:bg-tablet-surface-3 border border-tablet-border transition rounded-xl font-black flex flex-col items-center justify-center gap-1">
          <span class="text-tablet-text-dim">${icon('note',22)}</span><span class="text-xs hairline text-tablet-text-dim">OBS.</span>
        </button>
        <button onclick="openModal('finalize-shift')" class="flex-1 bg-petra-blue hover:bg-petra-blue-light transition rounded-xl font-black flex flex-col items-center justify-center gap-1">
          <span>${icon('flag',22)}</span><span class="text-xs hairline">ENCERRAR</span>
        </button>
      </div>

    </div>
  `;
}
function toggleRebritagem(key) {
  const st = State.tabletSession.rebritagemStates;
  const s = st[key];
  if (s.on) { s.totalMs += Date.now() - new Date(s.lastOn).getTime(); s.on = false; s.lastOn = null; }
  else { s.on = true; s.lastOn = new Date().toISOString(); }
  saveState(); render();
}

// ===== RECENT EVENTS LIST =====
function renderRecentEvents(eqId, title) {
  const events = getTodayEvents(eqId).slice(0, 8);
  if (!events.length) return '';
  return `
    <div class="mt-6 bg-tablet-surface border border-tablet-border rounded-2xl p-4">
      <div class="hairline text-petra-yellow mb-3">${escapeHtml(title)}</div>
      <div class="space-y-2 max-h-48 overflow-y-auto">
        ${events.map(e => `<div class="bg-tablet-bg rounded-lg p-2 text-xs flex items-center justify-between"><div class="flex items-center gap-2"><span>${eventIcon(e.type, e.subtype)}</span><span class="font-bold">${eventLabel(e)}</span></div><div class="mono-font text-tablet-text-dim">${fmtTimeShort(e.ts)}</div></div>`).join('')}
      </div>
    </div>
  `;
}
function eventIcon(type, subtype) {
  // v44.8 — retorna SVG inline ao invés de emoji
  if (type === 'trip')              return `<span style="color:${subtype==='productive'?'#16a34a':'#dc2626'}">${icon(subtype==='productive'?'check':'warning',16)}</span>`;
  if (type === 'stock-in')          return `<span style="color:#16a34a">${icon('inbound',16)}</span>`;
  if (type === 'stock-out')         return `<span style="color:#0ea5e9">${icon('outbound',16)}</span>`;
  if (type === 'stop')              return `<span style="color:#f97316">${icon('pause',16)}</span>`;
  if (type === 'alert-maintenance') return `<span style="color:#dc2626">${icon('wrench',16)}</span>`;
  if (type === 'alert-production')  return `<span style="color:#f59e0b">${icon('rock',16)}</span>`;
  if (type === 'furo')              return `<span style="color:#f4c718">${icon('drill',16)}</span>`;
  if (type === 'pipa-load')         return `<span style="color:#0ea5e9">${icon('water',16)}</span>`;
  if (type === 'rompimento')        return `<span style="color:#dc2626">${icon('hammer',16)}</span>`;
  if (type === 'extra-service')     return `<span style="color:#64748b">${icon('wrench',16)}</span>`;
  if (type === 'observation')       return `<span style="color:#64748b">${icon('note',16)}</span>`;
  if (type === 'checklist')         return `<span style="color:#16a34a">${icon('check',16)}</span>`;
  if (type === 'shift-end')         return `<span style="color:#043f89">${icon('flag',16)}</span>`;
  if (type === 'britagem-event')    return `<span style="color:#f59e0b">${icon('warning',16)}</span>`;
  if (type === 'peneira-event')     return `<span style="color:#f59e0b">${icon('warning',16)}</span>`;
  return '·';
}
function eventLabel(e) {
  if (e.type === 'trip') return e.subtype === 'productive' ? `Basculamento no primário (${e.tons}t)` : `Decape (${e.tons}t)`;
  if (e.type === 'stock-in') return `Entrada estoque · ${e.material} (${e.tons}t)`;
  if (e.type === 'stock-out') return `Saída · ${e.material} · ${e.truckType} (${e.conchas}c)`;
  if (e.type === 'stop') return `Parada · ${e.reason} (${fmtDurationShort(e.duration)})`;
  if (e.type === 'alert-maintenance') return `Alerta manut.: ${e.tag}`;
  if (e.type === 'alert-production') return `Alerta prod.: ${e.tag}`;
  if (e.type === 'furo') return `Furo #${e.furo} · ${e.profundidade}m`;
  if (e.type === 'pipa-load') return `Carga ${e.location} (${fmtDurationShort(e.duration)})`;
  if (e.type === 'rompimento') return `Rompimento (${fmtDurationShort(e.duration)})`;
  if (e.type === 'extra-service') return `Serviço: ${e.label}`;
  if (e.type === 'observation') return `Observação`;
  if (e.type === 'checklist') return e.allOk ? 'Checklist OK' : 'Checklist com pendências';
  if (e.type === 'shift-end') return `Fim de turno`;
  if (e.type === 'britagem-event') return `Evento britagem: ${e.eventType}`;
  if (e.type === 'peneira-event') return `${e.peneira}: ${e.eventType}`;
  return e.type;
}

function renderUniversalFooter() {
  // v44: função mantida (vazia) para retrocompatibilidade em casos de futura mistura
  // de tipos de equipamento. A whitelist em renderTabletOperational cobre todos os
  // kinds atuais, por isso a chamada original foi removida.
  return '';
}

<!-- ========== MODALS ========== -->
<script>
function renderModal() {
  if (!State.modal) return '';
  const m = State.modal;
  let body = '';
  if (m.type === 'admin-equipment-binding')   body = modalAdminEquipmentBinding();
  else if (m.type === 'admin-unblock')        body = modalAdminUnblock();
  else if (m.type === 'parada')               body = modalParada();
  else if (m.type === 'alert-maintenance')    body = modalAlertMaintenance();
  else if (m.type === 'alert-production')     body = modalAlertProduction();
  else if (m.type === 'finalize-shift')       body = modalFinalizeShift();
  else if (m.type === 'stock-in')             body = modalStockIn();
  else if (m.type === 'loader-stock-out')     body = modalLoaderStockOut();
  else if (m.type === 'extra-services')       body = modalExtraServices();
  else if (m.type === 'extra-services-loader')body = modalExtraServicesLoader();
  else if (m.type === 'observation')          body = modalObservation();
  else if (m.type === 'pipa-start')           body = modalPipaStart();
  else if (m.type === 'drill-start')          body = modalDrillStart(m.params);
  else if (m.type === 'britagem-event')       body = modalBritagemEvent(m.params);
  else if (m.type === 'rebritagem-peneira')   body = modalRebritagemPeneira(m.params);
  else if (m.type === 'mgmt-equipment-detail')body = modalMgmtEquipmentDetail(m.params);
  else if (m.type === 'mgmt-add-equipment')   body = modalMgmtAddEquipment();
  else if (m.type === 'mgmt-edit-equipment')  body = modalMgmtEditEquipment(m.params);
  else if (m.type === 'mgmt-add-operator')    body = modalMgmtAddOperator();
  else if (m.type === 'mgmt-edit-operator')   body = modalMgmtEditOperator(m.params);
  else if (m.type === 'mgmt-add-stop')        body = modalMgmtAddStop();
  else if (m.type === 'mgmt-edit-stop')       body = modalMgmtEditStop(m.params);
  else if (m.type === 'mgmt-add-mnt-alert')   body = modalMgmtAddMntAlert();
  else if (m.type === 'mgmt-edit-mnt-alert')  body = modalMgmtEditMntAlert(m.params);
  else if (m.type === 'mgmt-add-prod-alert')  body = modalMgmtAddProdAlert();
  else if (m.type === 'mgmt-edit-prod-alert') body = modalMgmtEditProdAlert(m.params);
  else if (m.type === 'mgmt-add-material')    body = modalMgmtAddMaterial();
  else if (m.type === 'mgmt-edit-material')   body = modalMgmtEditMaterial(m.params);
  else if (m.type === 'mgmt-add-trucktype')   body = modalMgmtAddTrucktype();
  else if (m.type === 'mgmt-edit-trucktype')  body = modalMgmtEditTrucktype(m.params);
  else body = '<div class="p-6">Modal não implementado</div>';
  const isMgmtModal = m.type && m.type.startsWith('mgmt-add') || m.type && m.type.startsWith('mgmt-edit');
  const panelBg = isMgmtModal ? 'bg-white border-slate-200 text-slate-900' : 'bg-tablet-surface border-tablet-border text-tablet-text';
  const modalSize = m.type === 'loader-stock-out'
    ? 'max-w-5xl w-full h-[88vh] overflow-hidden'
    : (m.type === 'finalize-shift' ? 'max-w-4xl w-full max-h-[92vh] overflow-y-auto' : 'max-w-3xl w-full max-h-[90vh] overflow-y-auto');
  return `<div class="fixed inset-0 z-50 modal-backdrop flex items-center justify-center p-3 animate-fade-in" onclick="if(event.target===this) closeModal()"><div class="${panelBg} border rounded-2xl shadow-2xl ${modalSize} animate-slide-up">${body}</div></div>`;
}

function modalAdminEquipmentBinding() {
  return `
    <div class="p-6">
      <div class="hairline text-petra-yellow mb-2">Acesso Restrito · Admin</div>
      <h2 class="display-font text-2xl mb-4">Trocar Equipamento Vinculado</h2>
      <p class="text-tablet-text-dim text-sm mb-4">Confirme suas credenciais de administrador para prosseguir.</p>
      <form onsubmit="event.preventDefault(); doAdminBinding();" class="space-y-3">
        <input id="ab-user" placeholder="usuário admin" class="w-full bg-tablet-bg border border-tablet-border rounded-lg px-4 py-3 mono-font" />
        <input id="ab-pass" type="password" placeholder="senha" class="w-full bg-tablet-bg border border-tablet-border rounded-lg px-4 py-3 mono-font" />
        <div id="ab-err" class="hidden text-op-red text-sm"></div>
        <div class="flex gap-2 pt-2">
          <button type="button" onclick="closeModal()" class="flex-1 py-3 bg-tablet-surface-2 hover:bg-tablet-surface-3 rounded-lg font-bold">Cancelar</button>
          <button class="flex-1 py-3 bg-petra-blue hover:bg-petra-blue-light rounded-lg font-bold">Confirmar</button>
        </div>
      </form>
    </div>
  `;
}
function doAdminBinding() {
  const u = document.getElementById('ab-user').value.trim();
  const p = document.getElementById('ab-pass').value;
  const op = demoFindOperator(u, p, true);
  if (!op) { document.getElementById('ab-err').textContent = 'Credenciais inválidas ou usuário não é admin.'; document.getElementById('ab-err').classList.remove('hidden'); return; }
  State.tabletSession.operator = op;
  State.tabletSession.boundEquipmentId = null;
  saveState();
  navigate('tablet-equipment');
}

function modalAdminUnblock() {
  return `
    <div class="p-6">
      <div class="hairline text-op-red mb-2">Liberação de Operação</div>
      <h2 class="display-font text-2xl mb-2">Liberar Equipamento Bloqueado</h2>
      <p class="text-tablet-text-dim text-sm mb-4">Apenas admin pode autorizar. Confirme as credenciais.</p>
      <form onsubmit="event.preventDefault(); doUnblock();" class="space-y-3">
        <input id="ub-user" placeholder="usuário admin" class="w-full bg-tablet-bg border border-tablet-border rounded-lg px-4 py-3 mono-font" />
        <input id="ub-pass" type="password" placeholder="senha" class="w-full bg-tablet-bg border border-tablet-border rounded-lg px-4 py-3 mono-font" />
        <div id="ub-err" class="hidden text-op-red text-sm"></div>
        <div class="flex gap-2 pt-2">
          <button type="button" onclick="closeModal()" class="flex-1 py-3 bg-tablet-surface-2 hover:bg-tablet-surface-3 rounded-lg font-bold">Cancelar</button>
          <button class="flex-1 py-3 bg-op-green hover:bg-op-green-dark rounded-lg font-bold inline-flex items-center justify-center gap-2 active:scale-[0.98] transition">${icon('unlock',18)} Liberar</button>
        </div>
      </form>
    </div>
  `;
}
function doUnblock() {
  const u = document.getElementById('ub-user').value.trim();
  const p = document.getElementById('ub-pass').value;
  const op = demoFindOperator(u, p, true);
  if (!op) { document.getElementById('ub-err').textContent = 'Credenciais inválidas.'; document.getElementById('ub-err').classList.remove('hidden'); return; }
  const eq = findEquipment(State.tabletSession.boundEquipmentId);
  State.tabletSession.blocked = false;
  State.tabletSession.blockReason = null;
  State.equipmentStates[eq.id] = { ...State.equipmentStates[eq.id], status:'operating', operator:State.tabletSession.operator?.name||null, since:new Date().toISOString() };
  pushEvent({ type:'observation', equipment:eq.id, operator:'Sistema', text:`Liberação de bloqueio autorizada por ${op.name}.` });
  saveState(); notify(); closeModal(); navigate('tablet-horimeter');
}

function modalParada() {
  const eq = findEquipment(State.tabletSession.boundEquipmentId);
  if (!eq) {
    return `
      <div class="modal-rich-anim">
        <div class="rich-modal-header danger"><div class="display-font text-xl flex items-center gap-2">${icon('warning',20)} Sessão inválida</div></div>
        <div class="p-6 text-center space-y-4">
          <p class="text-tablet-text-dim">Equipamento não encontrado. Faça login novamente.</p>
          <button onclick="closeModal()" class="w-full py-4 bg-tablet-surface-2 hover:bg-tablet-surface-3 rounded-xl font-bold">Fechar</button>
        </div>
      </div>`;
  }
  if (!State.tabletSession.activeStop) {
    State.tabletSession.activeStop = { startTs: new Date().toISOString(), reasonId: null, reason: null, note: '' };
    State.equipmentStates[eq.id] = { ...(State.equipmentStates[eq.id]||{}), status:'stopped', operator:State.tabletSession.operator?.name||null, since:State.tabletSession.activeStop.startTs, activeStopStart:State.tabletSession.activeStop.startTs, stopReason:'Aguardando motivo' };
    saveState();
  }
  const cur = State.tabletSession.activeStop;
  const elapsedMs = Date.now() - new Date(cur.startTs).getTime();
  const stats = getShiftStopStats();
  // Esta parada é a (stats.count + 1)ª do turno
  const ordinalParada = stats.count + 1;
  const ordinalLabel = (n) => {
    const o = ['1ª','2ª','3ª','4ª','5ª','6ª','7ª','8ª','9ª','10ª'];
    return o[n-1] || `${n}ª`;
  };
  // Capacidade efetiva pra estimar viagens "perdidas" durante a parada
  let estLostTrips = 0;
  try {
    const tgt = pcpGetTodayTruckTarget(eq.id);
    if (tgt && tgt.dailyTripsForTruck && tgt.effectiveCapacity) {
      // Aproxima viagens perdidas = (paradaMs / cycleMs). Ciclo ~ 1 viagem cada (8h/dailyTrips) ms.
      const shiftMs = 8 * 3600 * 1000;
      const cycleMs = tgt.dailyTripsForTruck > 0 ? (shiftMs / tgt.dailyTripsForTruck) : 0;
      if (cycleMs > 0) estLostTrips = Math.floor(elapsedMs / cycleMs);
    }
  } catch(e) {}
  const reasons = State.stopReasons.filter(r => !r.equipmentKinds || r.equipmentKinds.includes(eq.kind));
  // Cor do header: muda se a parada já passa de 30min (vira amarelo/vermelho)
  const elapsedMin = elapsedMs / 60000;
  const headerClass = elapsedMin > 30 ? 'danger' : (elapsedMin > 10 ? 'warning' : 'danger');
  const note = cur.note || '';
  return `
    <div class="modal-rich-anim">
      <div class="rich-modal-header ${headerClass}">
        <div class="flex items-start justify-between gap-3 relative">
          <div class="min-w-0">
            <div class="flex items-center gap-2 mb-1">
              <span class="live-dot"></span>
              <span class="text-xs font-black uppercase tracking-widest opacity-90">Parada ao vivo</span>
            </div>
            <div class="display-font text-2xl leading-tight flex items-center gap-2"><span aria-hidden="true">${icon(stopReasonSvg(cur.reason||''), 26)}</span> ${cur.reason ? escapeHtml(cur.reason) : 'Aguardando motivo...'}</div>
            <div class="text-xs opacity-80 mt-1">${escapeHtml(eq.code)} · iniciada às ${fmtTimeShort(cur.startTs)}</div>
          </div>
          <div class="text-right flex-shrink-0">
            <div class="timer-xl-live" data-timer-start="${cur.startTs}">${fmtDuration(elapsedMs)}</div>
            <div class="text-[10px] opacity-70 uppercase tracking-widest mt-1">decorrido</div>
          </div>
        </div>
      </div>

      <div class="p-5 space-y-4 max-h-[68vh] overflow-y-auto">

        <!-- Chips de contexto do turno -->
        <div class="grid grid-cols-3 gap-2">
          <div class="stat-chip ${ordinalParada >= 5 ? 'warn' : ''}">
            <span class="stat-label">N° da Parada</span>
            <span class="stat-value">${ordinalLabel(ordinalParada)}</span>
            <span class="stat-sub">${ordinalParada === 1 ? 'primeira do turno' : `+ ${stats.count} anteriores`}</span>
          </div>
          <div class="stat-chip ${stats.totalMs > 60*60000 ? 'warn' : ''}">
            <span class="stat-label">Acumulado</span>
            <span class="stat-value">${fmtDurationShort(stats.totalMs + elapsedMs)}</span>
            <span class="stat-sub">paradas no turno</span>
          </div>
          ${eq.kind === 'truck' ? `
          <div class="stat-chip ${estLostTrips >= 2 ? 'danger' : ''}">
            <span class="stat-label">Impacto Est.</span>
            <span class="stat-value">${estLostTrips > 0 ? '−'+estLostTrips : '—'}</span>
            <span class="stat-sub">viagens estimadas</span>
          </div>
          ` : `
          <div class="stat-chip">
            <span class="stat-label">Equipamento</span>
            <span class="stat-value" style="font-size:1rem; padding-top:6px;">${escapeHtml(eq.code)}</span>
            <span class="stat-sub">${escapeHtml(eq.name || '')}</span>
          </div>
          `}
        </div>

        <!-- Histórico de paradas anteriores do turno -->
        ${stats.history.length > 0 ? `
        <div class="modal-section">
          <div class="modal-section-title">Paradas anteriores deste turno (${stats.history.length})</div>
          <div class="space-y-1.5">
            ${stats.history.slice(-4).map(s => `
              <div class="history-row">
                <span aria-hidden="true">${icon(stopReasonSvg(s.reason), 18)}</span>
                <span class="h-time">${fmtTimeShort(s.start||s.ts)}–${fmtTimeShort(s.end||s.ts)}</span>
                <span class="h-dur">${fmtDurationShort(s.duration||0)}</span>
                <span class="h-label">${escapeHtml(s.reason || '—')}</span>
              </div>
            `).join('')}
            ${stats.history.length > 4 ? `<div class="text-xs text-center text-tablet-text-muted pt-1">+ ${stats.history.length - 4} parada(s) anteriores...</div>` : ''}
          </div>
        </div>
        ` : ''}

        <!-- Motivos categorizados -->
        <div class="modal-section">
          <div class="modal-section-title">Selecione o motivo desta parada</div>
          <div class="grid grid-cols-3 md:grid-cols-4 gap-2">
            ${reasons.map(r => {
              const selected = cur.reasonId === r.id;
              const special = r.special ? 'special' : '';
              return `
                <button onclick="setStopReason('${r.id}','${escapeHtml(r.label)}')"
                  class="reason-btn ${special} ${selected?'selected':''}"
                  aria-pressed="${selected}" aria-label="Motivo: ${escapeHtml(r.label)}">
                  <span class="reason-icon" aria-hidden="true">${icon(stopReasonSvg(r.label), 28)}</span>
                  <span class="reason-label">${escapeHtml(r.label)}</span>
                </button>
              `;
            }).join('')}
          </div>
          ${cur.reasonId === 'oficina' ? `
            <div class="mt-3 bg-op-red/10 border border-op-red/40 rounded-lg p-3 flex items-start gap-2">
              <span class="text-lg">⚠️</span>
              <div class="text-xs leading-relaxed">
                <b class="text-op-red">Atenção:</b> Ao selecionar <b>Oficina</b>, o equipamento será marcado como em manutenção e <b>permanecerá inativo</b> após finalizar a parada.
              </div>
            </div>
          ` : ''}
        </div>

        <!-- Nota opcional -->
        <div class="modal-section">
          <div class="modal-section-title">Observação adicional (opcional)</div>
          <textarea id="parada-note" rows="2" maxlength="200"
            placeholder="Detalhe relevante sobre esta parada..."
            class="w-full bg-tablet-bg border-2 border-tablet-border focus:border-petra-yellow rounded-lg px-3 py-2 text-sm resize-none focus:outline-none"

function setStopReason(id, label) {

  if (eq) State.equipmentStates[eq.id] = { ...(State.equipmentStates[eq.id]||{}), status:'stopped', stopReason:label, since:State.tabletSession.activeStop.startTs };

function cancelParada() {
  if (State.tabletSession.activeStop && !State.tabletSession.activeStop.reasonId) {
    const eq = findEquipment(State.tabletSession.boundEquipmentId);
    if (eq) State.equipmentStates[eq.id] = { ...(State.equipmentStates[eq.id]||{}), status:'operating', stopReason:null, activeStopStart:null, since:new Date().toISOString() };
    State.tabletSession.activeStop = null; saveState();

function finalizeParada() {
  const eq = findEquipment(State.tabletSession.boundEquipmentId);
  const op = State.tabletSession.operator;
  const cur = State.tabletSession.activeStop;
  const end = new Date().toISOString();
  const dur = Date.now() - new Date(cur.startTs).getTime();
  const note = (cur.note || '').trim();
  pushEvent({ type:'stop', equipment:eq.id, operator:op.name, reasonId:cur.reasonId, reason:cur.reason, start:cur.startTs, end, duration:dur, note: note || undefined });
  if (cur.reasonId === 'oficina') {
    State.tabletSession.oficinaStartTs = cur.startTs;
    State.tabletSession.oficinaEquipmentId = eq.id;
    State.equipmentStates[eq.id] = { ...State.equipmentStates[eq.id], status:'oficina', oficinaStart:cur.startTs, since:cur.startTs, activeStopStart:null, stopReason:cur.reason };
  } else {
    State.equipmentStates[eq.id] = { ...State.equipmentStates[eq.id], status:'operating', stopReason:null, activeStopStart:null, since:new Date().toISOString() };
  }
  State.tabletSession.activeStop = null;
  saveState(); notify(); closeModal();
  hapticOk();
    toast(`⏸ Parada finalizada (${fmtDurationShort(dur)})`, 'ok', 3000);
}

  const eq = findEquipment(State.tabletSession.boundEquipmentId);

  const finalText = text || tag;

function getFinalizeHorimeterFields(eq) {

  if (init && typeof init === 'object') {
    return Object.entries(init).map(([key, value]) => ({ key, label: finalHorimeterLabel(key), initial: Number(value)||0 }));
  }
  return [{ key:'horimeter', label:'Horímetro do Equipamento', initial: Number(State.tabletSession.initialHorimeter)||0 }];

    alimSec:'Alim. Secundário', britSec:'Britador Secundário', alimTer:'Alim. Terciário', britTer:'Britador Terciário',
    alimQua:'Alim. Quaternário', britQua:'Britador Quaternário', peneira1:'Peneira 1', peneira2:'Peneira 2', peneira3:'Peneira 3'

// v44.2 — Timeline visual do turno (barra horizontal com blocos de operação/parada)
function renderShiftTimeline(sum, eq) {
  if (!sum || !sum.shiftStart || sum.shiftMs <= 0) return '';
  const startMs = new Date(sum.shiftStart).getTime();
  const endMs   = startMs + sum.shiftMs;
  // Eventos de parada ordenados
  const stops = (sum.history || []).filter(e => e.type === 'stop' && e.start && e.end);
  // Funções pra converter ts em %
  const pct = (ts) => Math.max(0, Math.min(100, ((new Date(ts).getTime() - startMs) / sum.shiftMs) * 100));
  const stopBlocks = stops.map(s => {
    const left = pct(s.start);
    const width = Math.max(0.5, pct(s.end) - left);
    return `<div class="tl-block stopped" style="left:${left}%; width:${width}%;" title="${escapeHtml(s.reason||'')} · ${fmtDurationShort(s.duration||0)}"></div>`;
  }).join('');
  // Marcadores horários (a cada 2h)
  const markers = [];
  const oneHourMs = 3600 * 1000;
  for (let t = startMs; t <= endMs; t += 2 * oneHourMs) {
    const d = new Date(t);
    markers.push(`<div class="tl-marker" style="left:${pct(d.toISOString())}%;" data-label="${fmtTimeShort(d)}"></div>`);
  }
  return `
    <div class="mt-3">
      <div class="hairline text-tablet-text-muted text-[10px] mb-1.5 px-1">LINHA DO TEMPO · ${fmtTimeShort(sum.shiftStart)} → agora</div>
      <div class="shift-timeline" style="height:34px;">
        <div class="tl-axis">
          <div class="tl-block operating" style="left:0; width:100%;"></div>
          ${stopBlocks}
        </div>
        ${markers.join('')}
      </div>
      <div class="flex items-center gap-3 mt-2 text-[10px] text-tablet-text-muted px-1">
        <span class="flex items-center gap-1"><span style="width:10px;height:10px;background:#22c55e;border-radius:2px;display:inline-block;"></span> em operação</span>
        <span class="flex items-center gap-1"><span style="width:10px;height:10px;background:#f97316;border-radius:2px;display:inline-block;"></span> parada</span>
      </div>
    </div>
  `;
}
function fsAdjust(delta) { fsAdjustField('horimeter', delta); }
function fsAdjustField(key, delta) {
  const el = document.getElementById('fs-horim-' + key);
  if (!el) return;
  el.value = Math.max(0, (parseFloat(el.value)||0) + delta).toFixed(1);

function doFinalizeShift() {
  if (window._tl43FinalizingShift) return;
  window._tl43FinalizingShift = true;
  try {
    const eq = findEquipment(State.tabletSession.boundEquipmentId);
    const op = State.tabletSession.operator;
    if (!eq) { toast('Equipamento não encontrado. Faça login novamente.', 'err', 4000); window._tl43FinalizingShift=false; return; }
    if (!op) { toast('Operador não encontrado. Faça login novamente.', 'err', 4000); window._tl43FinalizingShift=false; return; }
    const finalInputs = Array.from(document.querySelectorAll('[data-fs-key]'));
    const horimFinals = {};
    for (const el of finalInputs) {
      const key = el.getAttribute('data-fs-key');
      const initial = parseFloat(el.getAttribute('data-fs-initial')) || 0;
      const val = parseFloat(el.value);
      if (isNaN(val)) { toast('Informe um horímetro válido para '+finalHorimeterLabel(key)+'.', 'err'); window._tl43FinalizingShift=false; return; }
      if (val < initial) { toast(finalHorimeterLabel(key)+' final ('+val+'h) não pode ser menor que o inicial ('+fmtNumber(initial,1)+'h).', 'err'); window._tl43FinalizingShift=false; return; }
      horimFinals[key] = val;
    }
    const devSelects = Array.from(document.querySelectorAll('[data-dev-key]'));
    for (const sel of devSelects) {
      const reason = sel.value;
      if (!reason) { toast('Selecione o motivo dos horários abaixo da meta antes de encerrar.', 'err', 4200); window._tl43FinalizingShift=false; return; }
      try { pcpSaveDeviation(sel.getAttribute('data-dev-key'), reason, 'Classificado no fechamento da parte diária'); }
      catch(e) { console.warn('Falha ao salvar justificativa PCP:', e); }
    }
    const obsMaint = (document.getElementById('fs-obs-maint')?.value || '').trim();
    const obsProd = (document.getElementById('fs-obs-prod')?.value || '').trim();
    if (obsMaint) pushEvent({ type:'alert-maintenance', equipment:eq.id, operator:op.name, tag:'Final de turno', text:obsMaint, resolved:false });
    if (obsProd) pushEvent({ type:'alert-production', equipment:eq.id, operator:op.name, tag:'Final de turno', text:obsProd, resolved:false });
    pushEvent({ type:'shift-end', equipment:eq.id, operator:op.name, horimInitial: State.tabletSession.initialHorimeters || State.tabletSession.initialHorimeter, horimFinal: Object.keys(horimFinals).length === 1 ? Object.values(horimFinals)[0] : horimFinals });
    if (horimFinals.horimeter != null) eq.lastHorimeter = horimFinals.horimeter;
    if (horimFinals.motor != null) eq.lastHorimeter = horimFinals.motor;
    if (horimFinals.martelo != null) eq.lastMartelo = horimFinals.martelo;
    if (horimFinals.alimentador != null) eq.lastHorimeterAlim = horimFinals.alimentador;
    if (horimFinals.britador != null) eq.lastHorimeterBrit = horimFinals.britador;
    const rebKeys = ['alimSec','britSec','alimTer','britTer','alimQua','britQua','peneira1','peneira2','peneira3'];
    if (rebKeys.some(k => horimFinals[k] != null)) {
      eq.lastHorimeters = { ...(eq.lastHorimeters||{}) };
      rebKeys.forEach(k => { if (horimFinals[k] != null) eq.lastHorimeters[k] = horimFinals[k]; });
    }
    if (!State.equipmentStates) State.equipmentStates = {};
    const currentEqState = State.equipmentStates[eq.id] || {};
    if (currentEqState.status !== 'oficina') {
      State.equipmentStates[eq.id] = { ...currentEqState, status:'off', operator:null, stopReason:null, activeStopStart:null, since:new Date().toISOString() };
    }
    const keepBound = State.tabletSession.boundEquipmentId;
    const keepOficinaStart = State.tabletSession.oficinaStartTs;
    const keepOficinaEq = State.tabletSession.oficinaEquipmentId;
    State.tabletSession = {
      boundEquipmentId: keepBound, operator: null,
      checklistDone: false, checklistResult: null, checklistDraft: null,
      initialHorimeter: null, initialHorimeters: null,
      shiftStartedAt: null, blocked: false, blockReason: null,
      activeStop: null, activeFurao: null, activePipa: null, activeRompimento: null,
      excavatorImplement: null, truckMode: null, drillBits: null,
      britagemStates: null, rebritagemStates: null,
      oficinaStartTs: keepOficinaStart, oficinaEquipmentId: keepOficinaEq,
      loaderDraft: null,
    };
    saveState(); notify(); navigate('tablet-login');
    toast('Turno encerrado com sucesso.', 'ok', 2200);
  } catch(err) {
    console.error('Erro ao encerrar turno:', err);
    toast('Erro ao encerrar turno: '+(err.message||err), 'err', 6000);
  } finally {
    window._tl43FinalizingShift = false;
  }
}

  else if (d.step === 'method') d.step = 'material';
  else { closeModal(); return; }
  saveState(); render();
}

  State.tabletSession.loaderDraft = { step:'material' };
  saveState(); render();
}

function _obsTemplate(label) {
  const cur = document.getElementById('obs-tag')?.value;

  const newVal = cur === label ? '' : label;
  document.querySelectorAll('[data-tpl-btn]').forEach(b => b.classList.toggle('selected', newVal && b.dataset.tplBtn === label));

function submitObservation() {
  const text = document.getElementById('obs-text').value.trim();

  const eq = findEquipment(State.tabletSession.boundEquipmentId);
